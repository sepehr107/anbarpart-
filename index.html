  document.getElementById('cancelPrePrint').addEventListener('click', close);
  document.getElementById('ovPrePrint').addEventListener('click', e=>{ if(e.target.id==='ovPrePrint') close(); });

  function refreshPreview(){
    const paperSize = root.querySelector('input[name="paperSize"]:checked').value;
    const orientation = root.querySelector('input[name="orientation"]:checked').value;
    const margin = Number(document.getElementById('ppMargin').value);
    const scalePct = Number(document.getElementById('ppScale').value);
    document.getElementById('ppMarginVal').textContent = margin.toLocaleString('fa-IR');
    document.getElementById('ppScaleVal').textContent = scalePct.toLocaleString('fa-IR');
    const paper = PAPER_SIZES[paperSize] || PAPER_SIZES.A6;
    const pageWmm = orientation==='landscape' ? paper.heightmm : paper.widthmm;
    const pageHmm = orientation==='landscape' ? paper.widthmm : paper.heightmm;
    const boxWmm = pageWmm - margin*2, boxHmm = pageHmm - margin*2;
    const labelPercent = Number(previewRec.label_percent ?? 100);
    const scale = (labelPercent>0 ? labelPercent/100 : 1) * (scalePct/100);
    const PREVIEW_PX_PER_MM = 2.2;
    document.getElementById('ppPreviewPage').style.width = (pageWmm*PREVIEW_PX_PER_MM)+'px';
    document.getElementById('ppPreviewPage').style.height = (pageHmm*PREVIEW_PX_PER_MM)+'px';
    const inner = document.getElementById('ppPreviewInner');
    const isClassic = (ls.template||'classic')==='classic';
    if(isClassic){
      const outW = boxWmm*scale, outH = boxHmm*scale;
      inner.style.width = (outW*PREVIEW_PX_PER_MM)+'px';
      inner.style.height = (outH*PREVIEW_PX_PER_MM)+'px';
      inner.innerHTML = classicLabelHtml(previewRec, ls);
    } else {
      const design = SETTINGS.labelSettings.design || defaultLabelDesign();
      const fitScale = Math.min(boxWmm/design.canvasW, boxHmm/design.canvasH) * scale;
      const outW = design.canvasW*fitScale, outH = design.canvasH*fitScale;
      inner.style.width = (outW*PREVIEW_PX_PER_MM)+'px';
      inner.style.height = (outH*PREVIEW_PX_PER_MM)+'px';
      inner.innerHTML = buildLabelSVG(previewRec, design);
    }
  }
  root.querySelectorAll('input[name="paperSize"], input[name="orientation"]').forEach(inp=> inp.addEventListener('change', refreshPreview));
  document.getElementById('ppMargin').addEventListener('input', refreshPreview);
  document.getElementById('ppScale').addEventListener('input', refreshPreview);
  refreshPreview();

  document.getElementById('confirmPrePrint').addEventListener('click', ()=>{
    ls.paperSize = root.querySelector('input[name="paperSize"]:checked').value;
    ls.orientation = root.querySelector('input[name="orientation"]:checked').value;
    ls.font = document.getElementById('ppFont').value;
    ls.margin = Number(document.getElementById('ppMargin').value);
    ls.printScale = Number(document.getElementById('ppScale').value);
    close();
    printLabels(ids);
  });
}

function printLabels(ids){
  let recs = ids.map(id=> RECORDS.find(r=>r.id===id)).filter(Boolean);
  const skipped = recs.filter(r=> Number(r.label_percent ?? 100)===0).length;
  recs = recs.filter(r=> Number(r.label_percent ?? 100)!==0);
  if(skipped>0) toast(`${skipped.toLocaleString('fa-IR')} مورد به‌دلیل درصد لیبل ۰٪ چاپ نشد`, 'error');
  if(recs.length===0){ toast('موردی برای چاپ یافت نشد','error'); return; }
  const ls = SETTINGS.labelSettings;
  const size = PAPER_SIZES[ls.paperSize] || PAPER_SIZES.A6;
  let pageStyle = document.getElementById('dynamicPageStyle');
  if(!pageStyle){ pageStyle = document.createElement('style'); pageStyle.id='dynamicPageStyle'; document.head.appendChild(pageStyle); }
  const orientation = ls.orientation==='landscape' ? 'landscape' : 'portrait';
  const marginMm = ls.margin ?? 8;
  pageStyle.textContent = `@page{ size:${size.css} ${orientation}; margin:${marginMm}mm; }`;
  const root = document.getElementById('printRoot');
  root.innerHTML = `<div class="label-sheet" style="display:block;">${recs.map(r=>labelHtml(r,ls)).join('')}</div>`;
  setTimeout(()=>{ window.print(); }, 100);
}

  if(state.shippingType) filtersDesc.push('نوع ارسال: '+state.shippingType);

  if(state.invFrom||state.invTo) filtersDesc.push('تاریخ فاکتور: '+(state.invFrom||'—')+' تا '+(state.invTo||'—'));
  if(state.sendFrom||state.sendTo) filtersDesc.push('تاریخ ارسال: '+(state.sendFrom||'—')+' تا '+(state.sendTo||'—'));

/* ===================== Send receipt via WhatsApp / Bale ===================== */
function openSendReceiptModal(rows){
  if(rows.length===0){ toast('موردی برای ارسال رسید انتخاب نشده است','error'); return; }
  const root = document.getElementById('modalRoot');
  const defaultKeys = ['order_no','gift_invoice_no','receiver_name','city','shipping_type','invoice_send_date','status'];
  const THANK_YOU = 'از حسن انتخاب و خرید شما متشکریم';

  function toWaLink(mobile, text){
    const num = toEnglishDigits(mobile||'').replace(/[^\d+]/g,'');
    if(!num) return null;
    let intlNum = num.replace(/^0/, '98');
    if(intlNum.startsWith('+')) intlNum = intlNum.slice(1);
    return `https://wa.me/${intlNum}?text=${encodeURIComponent(text)}`;
  }
  function buildTextFor(r, cols){
    const lines = [`رسید مرسوله — ${esc(SETTINGS.company.name)}`, `گیرنده: ${r.receiver_name||''}`, ''];
    lines.push(cols.map(c=> c.label+': '+(c.render(r).replace(/<[^>]+>/g,'')||'—')).join('\n'));
    lines.push('');
    lines.push(THANK_YOU);
    return lines.join('\n');
  }

  root.innerHTML = `
    <div class="modal-overlay" id="ovSendReceipt">
      <div class="modal-box" style="max-width:600px">
        <div class="modal-head"><h3>📨 ارسال رسید مرسولات (واتساپ / بله)</h3><button class="modal-close" id="closeSendReceipt">✕</button></div>
        <div class="modal-body">
          <p class="desc" style="margin-top:0;">رسید هر مرسوله مستقیماً به شماره همراه ثبت‌شده همان گیرنده ارسال می‌شود. مشخصاتی که می‌خواهید در متن رسید باشد را انتخاب کنید.</p>
          <div class="chips">
            ${REPORT_COLUMN_DEFS.map(c=>`<label class="chip-toggle"><input type="checkbox" data-sendcol="${c.key}" ${defaultKeys.includes(c.key)?'checked':''}/> ${c.label}</label>`).join('')}
          </div>
          <div id="sendReceiptRows" style="margin-top:16px; display:flex; flex-direction:column; gap:8px;"></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="cancelSendReceipt">بستن</button>
        </div>
      </div>
    </div>
  `;
  const close = ()=>{ root.innerHTML=''; };
  document.getElementById('closeSendReceipt').addEventListener('click', close);
  document.getElementById('cancelSendReceipt').addEventListener('click', close);
  document.getElementById('ovSendReceipt').addEventListener('click', e=>{ if(e.target.id==='ovSendReceipt') close(); });

  function refreshRows(){
    const keys = [...document.querySelectorAll('[data-sendcol]:checked')].map(chk=>chk.dataset.sendcol);
    const cols = REPORT_COLUMN_DEFS.filter(c=>keys.includes(c.key));
    document.getElementById('sendReceiptRows').innerHTML = rows.map(r=>{
      const text = buildTextFor(r, cols);
      const link = toWaLink(r.mobile, text);
      const rowsCount = Math.min(10, Math.max(4, text.split('\n').length));
      return `
        <div class="card card-pad" style="padding:12px;">
          <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:8px;">
            <div class="grow">
              <b>${esc(r.receiver_name)||'—'}</b>
              <small style="display:block; color:var(--slate);">${r.mobile? 'همراه: '+esc(r.mobile) : '⚠️ شماره همراه برای این گیرنده ثبت نشده'}</small>
            </div>
            ${link
              ? `<a class="btn btn-primary btn-sm" href="${link}" target="_blank">📲 ارسال واتساپ</a>
                 <button class="btn btn-dark btn-sm" data-copytext data-id="${r.id}">📋 کپی (بله)</button>`
              : `<button class="btn btn-ghost btn-sm" disabled>شماره ناموجود</button>`
            }
          </div>
          <textarea readonly rows="${rowsCount}" style="width:100%; font-family:var(--mono); font-size:11.5px; resize:vertical;">${esc(text)}</textarea>
        </div>`;
    }).join('');
    root.querySelectorAll('[data-copytext]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const r = rows.find(x=>String(x.id)===btn.dataset.id);
        const text = buildTextFor(r, cols);
        try{
          await navigator.clipboard.writeText(text);
          toast('متن رسید کپی شد — می‌توانید در بله (Bale) پیست و ارسال کنید','success');
        }catch(e){
          toast('کپی خودکار ممکن نشد؛ متن را به‌صورت دستی کپی کنید','error');
        }
      });
    });
  }
  root.querySelectorAll('[data-sendcol]').forEach(chk=> chk.addEventListener('change', refreshRows));
  refreshRows();
}

  category:{label:'دسته‌بندی', render:t=> t.type==='deposit' ? '—' : esc(t.category||'—')},

};
function pcTotals(){
  const txs = SETTINGS.pettyCash.transactions;
  const deposits = txs.filter(t=>t.type==='deposit').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const expenses = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+(Number(t.amount)||0),0);
  return {deposits, expenses, balance: deposits-expenses};
}
function pcFilteredRows(){
  let txs = SETTINGS.pettyCash.transactions.slice().sort((a,b)=> (b.date||'').localeCompare(a.date||'') || b.id-a.id);
  const q = (pcState.search||'').trim().toLowerCase();
  if(q) txs = txs.filter(t => [t.category, t.note, t.date].some(v => v && String(v).toLowerCase().includes(q)));
  if(pcState.category) txs = txs.filter(t => t.category === pcState.category);
  if(pcState.from || pcState.to) txs = txs.filter(t => inRange(t.date, pcState.from, pcState.to));
  return txs;
}

function renderPettyCashList(){
  const holder = document.getElementById('pettyCashList');
  if(!holder) return;
  const txs = pcFilteredRows();
  const chkAll = document.getElementById('chkAllPc');
  if(txs.length===0){
    holder.innerHTML = `<div class="empty-state" style="padding:30px 0;"><div>تراکنشی یافت نشد</div></div>`;
    if(chkAll) chkAll.checked = false;
    return;
  }
  const cols = pcState.columnOrder.map(k=>PC_COLUMN_DEFS[k]).filter(Boolean);
  const theadCells = ['<th style="width:34px"></th>']
    .concat(pcState.columnOrder.map(k=>`<th draggable="true" data-colkey="${k}" title="برای جابه‌جایی بکشید">⠿ ${PC_COLUMN_DEFS[k].label}</th>`))
    .concat(['<th style="width:70px">عملیات</th>']).join('');
  const bodyRows = txs.map(t=>`<tr data-id="${t.id}">
    <td><input type="checkbox" class="pcChk" data-pcid="${t.id}" ${pcState.selected.has(t.id)?'checked':''}/></td>
    ${pcState.columnOrder.map(k=>`<td>${PC_COLUMN_DEFS[k].render(t)}</td>`).join('')}
    <td><button class="btn btn-danger btn-sm" data-pcid="${t.id}">حذف</button></td>
  </tr>`).join('');
  holder.innerHTML = `
    <div class="table-wrap">
      <table class="data-table" id="pcTable">
        <thead><tr>${theadCells}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
  `;
  if(chkAll) chkAll.checked = txs.every(t=>pcState.selected.has(t.id));

  // Drag-and-drop column reordering
  let dragKey = null;
  holder.querySelectorAll('th[data-colkey]').forEach(th=>{
    th.addEventListener('dragstart', e=>{ dragKey = th.dataset.colkey; e.dataTransfer.effectAllowed = 'move'; });
    th.addEventListener('dragover', e=>{ e.preventDefault(); th.style.outline = '2px dashed var(--amber)'; });
    th.addEventListener('dragleave', ()=>{ th.style.outline = ''; });
    th.addEventListener('drop', e=>{
      e.preventDefault(); th.style.outline = '';
      const targetKey = th.dataset.colkey;
      if(!dragKey || dragKey===targetKey) return;
      const order = pcState.columnOrder;
      const from = order.indexOf(dragKey), to = order.indexOf(targetKey);
      order.splice(from,1); order.splice(to,0,dragKey);
      renderPettyCashList();
    });
  });

  holder.querySelectorAll('.pcChk').forEach(chk=>{
    chk.addEventListener('change', ()=>{
      const id = Number(chk.dataset.pcid);
      chk.checked ? pcState.selected.add(id) : pcState.selected.delete(id);
      if(chkAll) chkAll.checked = txs.every(t=>pcState.selected.has(t.id));
    });
  });
  holder.querySelectorAll('button[data-pcid]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = Number(btn.dataset.pcid);
      if(!confirm('این تراکنش حذف شود؟')) return;
      SETTINGS.pettyCash.transactions = SETTINGS.pettyCash.transactions.filter(t=>t.id!==id);
      pcState.selected.delete(id);
      renderPettyCashSummary();
      renderPettyCashList();
      toast('تراکنش حذف شد','success');
    });
  });
  holder.querySelectorAll('img[data-pcview]').forEach(img=>{
    img.addEventListener('click', ()=>{
      const t = SETTINGS.pettyCash.transactions.find(x=>x.id===Number(img.dataset.pcview));
      if(!t || !t.receipt_image) return;
      const root = document.getElementById('modalRoot');
      root.innerHTML = `
        <div class="modal-overlay" id="ovPcImg">
          <div class="modal-box" style="max-width:640px">
            <div class="modal-head"><h3>تصویر تنخواه — ${esc(t.date)||''}</h3><button class="modal-close" id="closePcImg">✕</button></div>
            <div class="modal-body" style="text-align:center;"><img src="${t.receipt_image}" style="max-width:100%; max-height:70vh; border-radius:10px;"/></div>
          </div>
        </div>`;
      const close = ()=>{ root.innerHTML=''; };
      document.getElementById('closePcImg').addEventListener('click', close);
      document.getElementById('ovPcImg').addEventListener('click', e=>{ if(e.target.id==='ovPcImg') close(); });
    });
  });
}

function importPcFromExcel(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      let added = 0, skipped = 0;
      for(let i=1;i<rows.length;i++){
        const row = rows[i];
        if(!row || row[3]===undefined || row[3]===''){ if(row && row.some(v=>v!==undefined && v!=='')) skipped++; continue; }
        const type = String(row[1]||'').trim().toLowerCase()==='expense' ? 'expense' : 'deposit';
        const category = type==='expense' ? (row[2]? String(row[2]).trim() : 'متفرقه') : null;
        if(category && !SETTINGS.pettyCash.categories.includes(category)) SETTINGS.pettyCash.categories.push(category);
        SETTINGS.pettyCash.transactions.push({
          id: nextPcId++,
          type,
          date: row[0]? normalizeDate(String(row[0]).trim()) : todayPersianDateStr(),
          category,
          amount: Number(row[3])||0,
          note: row[4]? String(row[4]).trim() : null,
        });
        added++;
      }
      document.getElementById('pcImportResult').textContent =
        `${added.toLocaleString('fa-IR')} تراکنش اضافه شد` + (skipped? ` — ${skipped.toLocaleString('fa-IR')} ردیف نامعتبر رد شد` : '');
      toast(added.toLocaleString('fa-IR')+' تراکنش تنخواه اضافه شد','success');
      renderPettyCashSummary();
      renderPettyCashList();
    }catch(err){
      toast('خطا در خواندن فایل اکسل تنخواه','error');
    }
    e.target.value = '';
  };
  reader.readAsBinaryString(file);
}

function renderShipTypesList(){
  const holder = document.getElementById('shipTypesList');
  if(!holder) return;
  if(SETTINGS.shippingTypes.length===0){
    holder.innerHTML = '<div style="color:var(--slate); font-size:12.5px;">هنوز روش ارسالی ثبت نشده است.</div>';
    return;
  }
  holder.innerHTML = SETTINGS.shippingTypes.map((s,idx)=>`
    <div class="list-row">
      <input type="checkbox" class="shipChk" data-idx="${idx}"/>
      <div class="logo-thumb">${s.logo?`<img src="${s.logo}" style="width:100%;height:100%;object-fit:contain;"/>`:'🚚'}</div>
      <div class="grow"><b>${esc(s.name)}</b></div>
      <label class="btn btn-ghost btn-sm" style="cursor:pointer;">لوگو<input type="file" accept="image/*" data-idx="${idx}" class="shipLogoInput" style="display:none;"/></label>
      <button class="btn btn-danger btn-sm" data-idx="${idx}" id="delShip${idx}">حذف</button>
    </div>
  `).join('');
  holder.querySelectorAll('.shipLogoInput').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const idx = Number(inp.dataset.idx);
      const file = e.target.files[0]; if(!file) return;
      SETTINGS.shippingTypes[idx].logo = await fileToDataUrl(file);
      toast('لوگو ذخیره شد','success');
      renderShipTypesList();
    });
  });
  SETTINGS.shippingTypes.forEach((s,idx)=>{
    const btn = document.getElementById('delShip'+idx);
    if(btn) btn.addEventListener('click', ()=>{
      SETTINGS.shippingTypes.splice(idx,1);
      renderShipTypesList();
      toast('روش ارسال حذف شد','success');
    });
  });
}

function renderCustList(q){
  const holder = document.getElementById('custList');
  if(!holder) return;
  q = (q||'').trim().toLowerCase();
  let list = CUSTOMERS;
  if(q) list = list.filter(c=> (c.name||'').toLowerCase().includes(q) || String(c.phone||'').includes(q) || (c.city||'').toLowerCase().includes(q));
  list = list.slice(0,200);
  if(list.length===0){ holder.innerHTML = '<div style="color:var(--slate); font-size:12.5px; padding:10px;">موردی یافت نشد.</div>'; return; }
  holder.innerHTML = list.map(c=>`
    <div class="list-row">
      <input type="checkbox" class="custChk" data-code="${esc(c.code)}"/>
      <div class="grow">
        <b>${esc(c.name)}</b>
        <small>${esc(c.province)||''} ${c.city?('، '+esc(c.city)):''} ${c.phone?(' — تلفن: '+esc(c.phone)):''}${c.mobile?(' — همراه: '+esc(c.mobile)):''}</small>
      </div>
      <button class="btn btn-ghost btn-sm" data-code="${esc(c.code)}" data-act="editCust">ویرایش</button>
      <button class="btn btn-danger btn-sm" data-code="${esc(c.code)}" data-act="delCust">حذف</button>
    </div>
  `).join('');
  holder.querySelectorAll('[data-act="editCust"]').forEach(btn=>{
    btn.addEventListener('click', ()=> openCustomerModal(btn.dataset.code));
  });
  holder.querySelectorAll('[data-act="delCust"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      CUSTOMERS = CUSTOMERS.filter(c=> String(c.code)!==btn.dataset.code);
      renderCustList(document.getElementById('custSearch').value);
      toast('مشتری حذف شد','success');
    });
  });
}

    </div>
  `;
  const close = ()=>{ root.innerHTML=''; };
  document.getElementById('closeCust').addEventListener('click', close);
  document.getElementById('cancelCust').addEventListener('click', close);
  document.getElementById('ovCust').addEventListener('click', e=>{ if(e.target.id==='ovCust') close(); });
  document.getElementById('saveCust').addEventListener('click', ()=>{
    const name = document.getElementById('c_name').value.trim();
    if(!name){ toast('نام مشتری الزامی است','error'); return; }
    const data = {
      code: cust.code, name,
      province: document.getElementById('c_province').value.trim(),
      city: document.getElementById('c_city').value.trim(),
      address: document.getElementById('c_address').value.trim(),
      postal_code: document.getElementById('c_postal').value.trim(),
      phone: document.getElementById('c_phone').value.trim(),
      mobile: document.getElementById('c_mobile').value.trim(),
      default_shipping_type: document.getElementById('c_default_ship').value.trim(),
      default_label_percent: Number((root.querySelector('input[name="c_label_percent"]:checked')||{}).value ?? 100),
    };
    if(editing){ Object.assign(cust, data); }
    else { CUSTOMERS.push(data); nextCustCode++; }
    close();
    toast('اطلاعات مشتری ذخیره شد','success');
    renderCustList('');
  });
}

function importCustomersFromExcel(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      let added = 0;

}

function importRecordsFromExcel(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      let added = 0, skipped = 0;
      for(let i=1;i<rows.length;i++){
        const row = rows[i];
        if(!row || !row[4]){ if(row && row.some(v=>v!==undefined && v!=='')) skipped++; continue; } // receiver name required
        RECORDS.push({
          id: nextId++,
          order_no: row[0]!==undefined && row[0]!=='' ? String(row[0]).trim() : null,
          gift_invoice_no: row[1]!==undefined && row[1]!=='' ? String(row[1]).trim() : null,
          invoice_date: row[2]? normalizeDate(String(row[2]).trim()) : todayPersianDateStr(),
          invoice_send_date: row[3]? normalizeDate(String(row[3]).trim()) : null,
          receiver_code: null,
          receiver_name: String(row[4]).trim(),
          carton_count: row[5]!==undefined && row[5]!=='' ? Number(row[5]) : null,
          shipping_type: row[6]? String(row[6]).trim() : null,
          product: row[7]? String(row[7]).trim() : null,
          province: row[8]? String(row[8]).trim() : null,
          city: row[9]? String(row[9]).trim() : null,
          address: row[10]? String(row[10]).trim() : null,
          phone: row[11]? String(row[11]).trim() : null,
          mobile: row[12]? String(row[12]).trim() : null,
          postal_code: row[13]? String(row[13]).trim() : null,
          tracking_code: row[14]? String(row[14]).trim() : null,
          shipping_cost: row[15]!==undefined && row[15]!=='' ? Number(row[15]) : null,
          status: row[16]? String(row[16]).trim() : 'در انتظار ارسال',
          signature: null, receipt_image: null,
          sender: (SETTINGS.senders[0] && SETTINGS.senders[0].name) || null,
        });
        added++;
      }
      document.getElementById('recordsImportResult').textContent =
        `${added.toLocaleString('fa-IR')} مرسوله اضافه شد` + (skipped? ` — ${skipped.toLocaleString('fa-IR')} ردیف به دلیل نداشتن نام گیرنده رد شد` : '');
      toast(added.toLocaleString('fa-IR')+' مرسوله اضافه شد','success');
      state.page = Infinity;
      refreshAll();
    }catch(err){
      toast('خطا در خواندن فایل اکسل مرسولات','error');
    }
    e.target.value = '';
  };
  reader.readAsBinaryString(file);
}

    if(confirm('آیا مطمئن هستید؟ تمام تغییرات این جلسه پاک می‌شود.')){
      RECORDS = JSON.parse(document.getElementById('records-data').textContent);
      CUSTOMERS = JSON.parse(document.getElementById('customers-data').textContent);
      SETTINGS = JSON.parse(document.getElementById('settings-data').textContent);
      ensurePettyCash();
      nextId = Math.max(0, ...RECORDS.map(r=>r.id||0)) + 1;
      nextCustCode = Math.max(0, ...CUSTOMERS.map(c=>Number(c.code)||0)) + 1;
      recomputeNextPcId();

}
function fullState(){
  return {RECORDS, CUSTOMERS, SETTINGS};
}
function exportJson(){
  const blob = new Blob([JSON.stringify(fullState(), null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `پشتیبان-سامانه-مرسولات-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('فایل پشتیبان دانلود شد','success');
}
function importJson(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(Array.isArray(data)){
        RECORDS = data; // backward compatibility with old records-only backups
      } else if(data && data.RECORDS){
        RECORDS = data.RECORDS;
        if(data.CUSTOMERS) CUSTOMERS = data.CUSTOMERS;
        if(data.SETTINGS) SETTINGS = data.SETTINGS;
      } else { throw new Error('bad'); }
      ensurePettyCash();
      nextId = Math.max(0, ...RECORDS.map(r=>r.id||0)) + 1;
      nextCustCode = Math.max(0, ...CUSTOMERS.map(c=>Number(c.code)||0)) + 1;
      recomputeNextPcId();
      toast('اطلاعات با موفقیت بارگذاری شد','success');
      refreshAll();
      switchTab('list');
    }catch(err){
      toast('فایل پشتیبان معتبر نیست','error');
    }
  };
  reader.readAsText(file);
}
function exportXlsx(){
  const headers = ['شماره فاکتور','شماره فاکتور تستر/گیفت','تاریخ صدور فاکتور','تاریخ ارسال فاکتور','کد گیرنده','نام گیرنده','تعداد کارتن','نوع ارسال','محصول','استان','شهرستان','آدرس','تلفن ثابت','شماره همراه','کد پستی','کد رهگیری','هزینه ارسال (تومان)','وضعیت','ارسال‌کننده'];
  const rows = RECORDS.map(r=>[
    r.order_no, r.gift_invoice_no, normalizeDate(r.invoice_date), normalizeDate(r.invoice_send_date), r.receiver_code, r.receiver_name, r.carton_count,
    r.shipping_type, r.product, r.province, r.city, r.address,
    r.phone, r.mobile, r.postal_code, r.tracking_code, r.shipping_cost, r.status, r.sender
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = headers.map(()=>({wch:18}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'مرسولات');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `مرسولات-${today}.xlsx`);
  toast('فایل اکسل دانلود شد','success');
}
function exportHtmlSnapshot(){
  try{
    const doc = document.documentElement.cloneNode(true);
    const setJson = (id, obj)=>{
      const node = doc.querySelector('#'+id);
      if(node) node.textContent = JSON.stringify(obj);
    };
    setJson('records-data', RECORDS);
    setJson('customers-data', CUSTOMERS);
    setJson('settings-data', SETTINGS);
    // clear any leftover print/modal content in the snapshot
    const pr = doc.querySelector('#printRoot'); if(pr) pr.innerHTML='';
    const mr = doc.querySelector('#modalRoot'); if(mr) mr.innerHTML='';
    const dynStyle = doc.querySelector('#dynamicPageStyle'); if(dynStyle) dynStyle.remove();
    const html = '<!DOCTYPE html>\n' + doc.outerHTML;
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `سامانه-مرسولات-${today}.html`;
    a.click();
    URL.revokeObjectURL(url);
    toast('فایل HTML سامانه دانلود شد','success');
  }catch(err){
    toast('خطا در ساخت فایل HTML','error');
  }
}

/* ===================== Router / init ===================== */
function positionIndicator(navSelector, indicatorEl, tab){
  const nav = document.querySelector(navSelector);
  if(!nav || !indicatorEl) return;
  const btn = nav.querySelector(`[data-tab="${tab}"]`);
  if(!btn) return;
  indicatorEl.style.left = btn.offsetLeft + 'px';
  indicatorEl.style.width = btn.offsetWidth + 'px';
}
function positionAllIndicators(tab){
  positionIndicator('.tabbar', document.getElementById('tabIndicator'), tab);
  positionIndicator('.bottom-nav', document.getElementById('bnIndicator'), tab);
}
window.addEventListener('resize', ()=> positionAllIndicators(state.tab));

function switchTab(tab){
  state.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.bn-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.view').forEach(v=> v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='dashboard') renderDashboard();
  if(tab==='list'){ state.page = Infinity; renderList(); }
  if(tab==='pettycash') renderPettyCashTab();
  if(tab==='leave') renderLeaveTab();
  if(tab==='cashreceipt') renderCashReceiptTab();
  if(tab==='management') renderManagement();
  if(tab==='data') renderDataView();
  if(typeof updateFab==='function') updateFab();
  requestAnimationFrame(()=> positionAllIndicators(tab));
}
function refreshAll(){
  renderTopbar();
  if(state.tab==='dashboard') renderDashboard();
  if(state.tab==='list') renderList();
  if(state.tab==='pettycash') renderPettyCashTab();
  if(state.tab==='management') renderManagement();
  if(state.tab==='data') renderDataView();
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});
document.querySelectorAll('.bn-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});
const _btnTopThemeLight = document.getElementById('btnTopThemeLight');
const _btnTopThemeDark = document.getElementById('btnTopThemeDark');
if(_btnTopThemeLight) _btnTopThemeLight.addEventListener('click', ()=> setTheme('light'));
if(_btnTopThemeDark) _btnTopThemeDark.addEventListener('click', ()=> setTheme('dark'));

function updateFab(){
  const fab = document.getElementById('fabAdd');
  if(!fab) return;
  const map = {list:'btnAddNew', pettycash:'btnAddDeposit'};
  const targetId = map[state.tab];
  fab.classList.toggle('show', !!targetId);
  fab.onclick = ()=>{ const t = targetId && document.getElementById(targetId); if(t) t.click(); };
}

renderTopbar();
switchTab('dashboard');
setTheme(state.theme);

if('serviceWorker' in navigator && (location.protocol==='http:' || location.protocol==='https:')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{ /* PWA install features unavailable when not served over http(s) */ });
  });
}
