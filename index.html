  --ink-soft:#3A3F4B;
  --slate:#6B7280;
  --slate-light:#7A828E;
  --amber:#4F63E0;              /* primary brand accent (kept var name "amber" for compatibility) */
  --amber-dark:#3E4FC2;
  --amber-tint:#EEF0FD;
  --line:rgba(18,20,26,0.10);
  --line-soft:rgba(18,20,26,0.07);
  --success:#1FA163;
  --success-tint:#E8F8EF;
  --danger:#E5484D;
  --danger-tint:#FDECEC;
  --info:#3E8FD9;
  --info-tint:#EAF4FC;

  --shadow-xs: 0 1px 2px rgba(18,20,26,0.05);
  --shadow-sm: 0 1px 3px rgba(18,20,26,0.06), 0 1px 2px rgba(18,20,26,0.04);
  --shadow-md: 0 10px 26px rgba(18,20,26,0.09), 0 2px 8px rgba(18,20,26,0.05);
  --shadow-lg: 0 22px 50px rgba(18,20,26,0.18), 0 6px 16px rgba(18,20,26,0.07);
  --shadow-float: 0 14px 34px rgba(18,20,26,0.14), 0 2px 6px rgba(18,20,26,0.05);
  --shadow-glow: 0 0 0 4px var(--amber-tint);

  --radius: 16px;
  --radius-sm: 12px;
  --radius-lg: 22px;
  --radius-xl: 28px;
  --mono: 'SF Mono', 'Courier New', ui-monospace, monospace;

  --ease: cubic-bezier(.22,1,.36,1);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --spring-soft: cubic-bezier(.32,1.2,.44,1);
  --dur-fast: .15s;
  --dur: .24s;
  --dur-slow: .38s;

  --glass-bg: rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.5);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
body.theme-dark{
  --paper:#17181C;
  --paper-raised:#212227;
  --paper-alt:#26272D;
  --ink:#F1F1F3;
  --ink-soft:#C9CACF;
  --slate:#94959D;
  --slate-light:#8A8B92;
  --amber:#7C8CF5;
  --amber-dark:#93A1F7;
  --amber-tint:#2A2C42;
  --line:rgba(255,255,255,0.09);
  --line-soft:rgba(255,255,255,0.06);
  --success:#3FCA85;
  --success-tint:#17291F;
  --danger:#F17B7E;
  --danger-tint:#30201F;
  --info:#6FB3EA;
  --info-tint:#1B2733;

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.35);
  --shadow-md: 0 10px 26px rgba(0,0,0,0.42);
  --shadow-lg: 0 26px 56px rgba(0,0,0,0.55);
  --shadow-float: 0 14px 34px rgba(0,0,0,0.45);
  --shadow-glow: 0 0 0 4px var(--amber-tint);
  --glass-bg: rgba(28,29,34,0.68);
  --glass-border: rgba(255,255,255,0.08);
}

/* Fixed-dark surfaces (unchanged across themes) */
body.theme-dark table.data-table thead th{background:#2A2B31; color:var(--ink);}
body.theme-dark table.data-table thead th:hover{background:#323339;}
body.theme-dark .btn-dark{background:var(--amber); color:#17181C;}
body.theme-dark .pg-btn.active{background:var(--amber); color:#17181C; border-color:var(--amber);}
body.theme-dark .toast{background:#1B1E26; color:var(--ink);}
body.theme-dark .toast.success{background:var(--success) !important; color:#06150e !important;}
body.theme-dark .toast.error{background:var(--danger) !important; color:#1f0a0a !important;}
body.theme-dark table.data-table tbody tr:hover{background:#191c24;}
body.theme-dark table.data-table tbody tr:nth-child(even){background:#14161d;}
body.theme-dark table.data-table tbody tr:nth-child(even):hover{background:#191c24;}
body.theme-dark .sig-section canvas{background:#fff;}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Vazirmatn', Tahoma, Arial, sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:14.5px;
  line-height:1.65;
  letter-spacing:-0.005em;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
::selection{background:var(--amber-tint); color:var(--ink);}
button{font-family:inherit; -webkit-tap-highlight-color:transparent;}
input,select,textarea{font-family:inherit;}
img{max-width:100%;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px; border:2px solid var(--paper);}
::-webkit-scrollbar-thumb:hover{background:var(--slate-light);}

@keyframes fadeInUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
@keyframes scaleIn{from{opacity:0; transform:scale(.94) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);}}
@keyframes slideUp{from{transform:translateY(18px); opacity:0;} to{transform:translateY(0); opacity:1;}}
@keyframes toastIn{from{transform:translate(-50%,20px) scale(.9); opacity:0;} to{transform:translate(-50%,0) scale(1); opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-200% 0;} 100%{background-position:200% 0;}}
@keyframes pulseDot{0%,100%{opacity:1;} 50%{opacity:.35;}}
@keyframes popIn{0%{transform:scale(.85); opacity:0;} 60%{transform:scale(1.03);} 100%{transform:scale(1); opacity:1;}}
@keyframes checkPop{0%{transform:scale(.6); opacity:0;} 55%{transform:scale(1.18);} 100%{transform:scale(1); opacity:1;}}
@keyframes ringGrow{from{stroke-dashoffset:var(--ring-start,283);} to{stroke-dashoffset:var(--ring-end,0);}}
@keyframes floatIn{from{opacity:0; transform:translateY(10px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.press{transition:transform var(--dur-fast) var(--spring);}
.press:active{transform:scale(.95);}

/* ===== Topbar (glass) ===== */
.topbar{
  background:var(--glass-bg);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  color:var(--ink);
  padding:calc(10px + var(--safe-t)) 22px 10px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
  border-bottom:1px solid var(--line-soft);
  gap:16px; flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:11px;}
.brand-mark{
  width:38px; height:38px; border-radius:11px;
  background:linear-gradient(150deg, var(--amber), var(--amber-dark));
  display:flex; align-items:center; justify-content:center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 3px 10px rgba(79,99,224,0.35);
  flex-shrink:0; overflow:hidden;
}
.brand-mark img{width:100%; height:100%; object-fit:cover;}
.brand-text h1{font-size:14.5px; font-weight:800; margin:0; letter-spacing:-.01em; color:var(--ink);}
.brand-text span{font-size:10.5px; color:var(--slate); font-weight:600;}
.topbar-clock{text-align:center; padding:0 14px; border-inline:1px solid var(--line-soft);}
.topbar-clock .fa-date{font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink);}
.topbar-clock .fa-time{font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--amber);}
.topbar-clock .en-date{font-size:9.5px; color:var(--slate); margin-top:1px;}
.topbar-stats{display:flex; gap:16px;}
.topbar-stat{text-align:center;}
.topbar-stat b{display:block; font-size:15.5px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink);}
.topbar-stat small{font-size:9.5px; color:var(--slate); font-weight:600;}
.theme-toggle{
  display:flex; align-items:center; gap:2px; background:var(--paper); border:1px solid var(--line-soft);
  border-radius:999px; padding:3px; flex-shrink:0;
}
.theme-toggle button{
  border:none; background:transparent; width:30px; height:28px; border-radius:999px; cursor:pointer;
  font-size:14px; display:flex; align-items:center; justify-content:center; color:var(--slate);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.theme-toggle button.active{background:var(--paper-raised); color:var(--ink); box-shadow:var(--shadow-xs);}

/* ===== Tabs (segmented control, desktop) ===== */
.tabbar{
  display:flex; gap:2px; flex-wrap:wrap; position:relative;
  background:var(--paper-alt);
  padding:5px; margin:18px 22px 0;
  border-radius:var(--radius);
  border:1px solid var(--line-soft);
  width:fit-content;
}
.tab-btn{
  border:none; background:transparent; color:var(--slate);
  padding:9px 18px; border-radius:calc(var(--radius) - 5px);
  font-size:13px; font-weight:600; cursor:pointer;
  transition:color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--spring);
  display:flex; align-items:center; gap:7px;
  position:relative; z-index:1;
}
.tab-btn:hover{color:var(--ink);}
.tab-btn:active{transform:scale(.95);}
.tab-btn.active{color:#fff;}
body.theme-dark .tab-btn.active{color:#17181C;}
.tab-indicator{
  position:absolute; top:5px; bottom:5px; border-radius:calc(var(--radius) - 5px);
  background:var(--ink); box-shadow:var(--shadow-sm); z-index:0;
  transition:left var(--dur-slow) var(--spring), width var(--dur-slow) var(--spring), background var(--dur) var(--ease);
}
body.theme-dark .tab-indicator{background:var(--amber);}

.sub-tabbar{
  display:flex; gap:2px; flex-wrap:wrap; position:relative;
  background:var(--paper-alt); padding:5px; margin:0 0 16px;
  border-radius:var(--radius); border:1px solid var(--line-soft);
  width:fit-content; max-width:100%;
}
.sub-tabbar .tab-btn{padding:8px 15px; font-size:12.5px;}
@media (max-width:600px){ .sub-tabbar{width:100%;} .sub-tabbar .tab-btn{flex:1; justify-content:center; padding:8px 8px;} }

.page{padding:18px 22px calc(84px + var(--safe-b)); max-width:1560px; margin:0 auto;}
.view{display:none;}
.view.active{display:block; animation:floatIn .32s var(--spring-soft);}

/* ===== Cards ===== */
.card{
  background:var(--paper-raised);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
  transition:box-shadow var(--dur) var(--ease), transform var(--dur-fast) var(--spring), border-color var(--dur) var(--ease);
}
.card-pad{padding:22px;}
.card.tappable{cursor:pointer;}
.card.tappable:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
.card.tappable:active{transform:scale(.985); box-shadow:var(--shadow-sm);}

/* ===== Buttons ===== */
.btn{
  display:inline-flex; align-items:center; gap:6px; justify-content:center;
  padding:11px 18px; min-height:40px; border-radius:12px; border:1px solid transparent;
  font-size:13.5px; font-weight:650; cursor:pointer;
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--spring), box-shadow var(--dur-fast) var(--ease), filter var(--dur-fast) var(--ease);
  white-space:nowrap; letter-spacing:-.005em;
}
.btn:active{transform:scale(.95);}
.btn-primary{background:linear-gradient(155deg, var(--amber), var(--amber-dark)); color:#fff; box-shadow:0 4px 14px rgba(79,99,224,0.34), inset 0 1px 0 rgba(255,255,255,0.18);}
.btn-primary:hover{filter:brightness(1.06); box-shadow:0 6px 18px rgba(79,99,224,0.42), inset 0 1px 0 rgba(255,255,255,0.18);}
.btn-ghost{background:var(--paper); color:var(--ink); border-color:var(--line-soft);}
.btn-ghost:hover{background:var(--paper-alt); border-color:var(--slate-light);}
.btn-dark{background:linear-gradient(155deg, var(--ink), var(--ink-soft)); color:var(--paper-raised);}
body.theme-dark .btn-dark{background:linear-gradient(155deg, var(--amber), var(--amber-dark)); color:#17181C;}
.btn-dark:hover{filter:brightness(1.15);}
.btn-danger{background:var(--danger-tint); color:var(--danger);}
.btn-danger:hover{filter:brightness(.96);}
.btn-sm{padding:7px 13px; min-height:32px; font-size:12.5px; border-radius:10px;}
.btn-icon{width:36px; height:36px; min-height:36px; padding:0; justify-content:center; border-radius:11px; font-size:14px;}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

/* ===== Form elements ===== */
.field{display:flex; flex-direction:column; gap:6px;}
.field label{font-size:11.5px; font-weight:700; color:var(--slate); letter-spacing:.01em;}
.field input, .field select, .field textarea{
  border:1.5px solid var(--line); border-radius:13px; padding:11px 14px;
  font-size:14px; background:var(--paper-raised); color:var(--ink);
  transition:border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease); width:100%;
  min-height:44px;
}
.field input:hover, .field select:hover, .field textarea:hover{border-color:var(--slate-light);}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:none; border-color:var(--amber); box-shadow:0 0 0 3.5px var(--amber-tint);
}
.field textarea{resize:vertical; min-height:64px;}
.field-hint{font-size:11px; color:var(--slate-light);}
.form-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px 16px;}
.form-grid .span2{grid-column:span 2;}
.form-grid .span3{grid-column:span 3;}
.sig-section{margin-top:18px; padding-top:14px; border-top:1px solid var(--line-soft);}
@media (max-width:900px){.form-grid{grid-template-columns:1fr 1fr;}}

/* ===== Dashboard ===== */
.dash-head{display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:18px;}
.page-title{font-size:24px; font-weight:800; letter-spacing:-.02em; margin:0 0 3px; color:var(--ink);}
.page-subtitle{font-size:13px; color:var(--slate); margin:0; font-weight:500;}
.quick-actions{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px;}
@media (max-width:700px){.quick-actions{grid-template-columns:repeat(2,1fr);}}
.qa-btn{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  background:var(--paper-raised); border:1px solid var(--line-soft); border-radius:var(--radius-lg);
  padding:16px 10px; cursor:pointer; box-shadow:var(--shadow-xs);
  transition:transform var(--dur-fast) var(--spring), box-shadow var(--dur-fast) var(--ease);
  font-size:12.5px; font-weight:700; color:var(--ink-soft);
}
.qa-btn:hover{box-shadow:var(--shadow-md); transform:translateY(-2px);}
.qa-btn:active{transform:scale(.94);}
.qa-ic{width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:19px;}
.activity-list{display:flex; flex-direction:column;}
.activity-item{
  display:flex; align-items:center; gap:11px; padding:11px 6px; border-radius:12px; cursor:pointer;
  transition:background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--spring);
}
.activity-item:hover{background:var(--paper-alt);}
.activity-item:active{transform:scale(.98);}
.activity-item + .activity-item{border-top:1px solid var(--line-soft);}
.activity-dot{width:9px; height:9px; border-radius:50%; flex:none; background:var(--slate-light);}
.activity-dot.badge-status-sent{background:var(--success);}
.activity-dot.badge-status-pending{background:var(--info);}
.activity-dot.badge-status-returned{background:var(--danger);}
.activity-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;}
.activity-body b{font-size:13px; font-weight:700; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.activity-body span{font-size:11.5px; color:var(--slate);}
.activity-meta{text-align:left; display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex:none;}
.activity-meta small{font-size:10.5px; color:var(--slate-light); font-variant-numeric:tabular-nums;}
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px;}
@media (max-width:1100px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--paper-raised); border:1px solid var(--line-soft); border-radius:var(--radius-lg);
  padding:17px 19px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
  animation:floatIn .4s var(--spring-soft) backwards;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.stat-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-md);}
.stat-grid .stat-card:nth-child(1){animation-delay:.02s;}
.stat-grid .stat-card:nth-child(2){animation-delay:.06s;}
.stat-grid .stat-card:nth-child(3){animation-delay:.10s;}
.stat-grid .stat-card:nth-child(4){animation-delay:.14s;}
.stat-card::before{content:''; position:absolute; inset-inline-start:0; top:14px; bottom:14px; width:3px; border-radius:3px; background:var(--accent,var(--amber));}
.stat-card .val{font-size:25px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink); letter-spacing:-.02em;}
.stat-card .lbl{font-size:12px; color:var(--slate); font-weight:600; margin-top:3px;}
.dash-cols{display:grid; grid-template-columns:1.2fr 1fr; gap:16px;}
@media (max-width:1000px){.dash-cols{grid-template-columns:1fr;}}
.panel-title{font-size:14px; font-weight:800; margin:0 0 14px; display:flex; align-items:center; justify-content:space-between; letter-spacing:-.01em;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.bar-row .name{width:110px; font-size:12.5px; color:var(--ink-soft); font-weight:600; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bar-track{flex:1; height:8px; background:var(--paper); border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--amber), var(--amber-dark)); border-radius:5px; transition:width .5s var(--ease-out);}
.bar-row .count{width:38px; text-align:left; font-size:12px; font-weight:700; color:var(--slate); font-variant-numeric:tabular-nums;}

/* ===== Table ===== */
.table-toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px;}
.filter-row2{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; padding-top:10px; border-top:1px dashed var(--line-soft);}
.filter-row2 .grp{display:flex; align-items:center; gap:6px; background:var(--paper); border:1px solid var(--line-soft); border-radius:10px; padding:6px 10px;}
.filter-row2 .grp label{font-size:11.5px; font-weight:700; color:var(--slate);}
.filter-row2 .grp input{border:none; background:transparent; font-size:12.5px; width:96px; padding:2px; color:var(--ink);}
.filter-row2 .grp input:focus{outline:none;}
.search-box{position:relative; flex:1; min-width:220px;}
.search-box input{width:100%; padding:10px 38px 10px 14px; border-radius:11px; border:1px solid var(--line); font-size:13.5px; background:var(--paper-raised); color:var(--ink);}
.search-box input:focus{outline:none; border-color:var(--amber); box-shadow:0 0 0 3.5px var(--amber-tint);}
.search-box .icon{position:absolute; inset-inline-end:12px; top:50%; transform:translateY(-50%); color:var(--slate-light); transition:transform var(--dur-fast) var(--spring), color var(--dur-fast) var(--ease); cursor:default;}
.search-box input:not(:placeholder-shown) + .icon{cursor:pointer;}
.search-box .icon:active{transform:translateY(-50%) scale(.8);}
.filter-select{padding:9px 12px; border:1px solid var(--line); border-radius:11px; font-size:13px; background:var(--paper-raised); color:var(--ink); min-width:120px;}
.table-wrap{overflow-x:auto; border:1px solid var(--line-soft); border-radius:var(--radius-lg); background:var(--paper-raised);}
table.data-table{width:100%; border-collapse:collapse; font-size:11.8px; min-width:880px; table-layout:fixed;}
table.data-table thead th{
  background:var(--ink); color:#EDEFF2; position:sticky; top:0; z-index:2;
  padding:10px 6px; text-align:right; font-weight:700; font-size:10.6px; white-space:nowrap;
  cursor:pointer; user-select:none; overflow:hidden; text-overflow:ellipsis;
  transition:background var(--dur-fast) var(--ease);
}
table.data-table thead th:hover{background:var(--ink-soft);}
#pcTable thead th[draggable="true"]{cursor:grab;}
#pcTable thead th[draggable="true"]:active{cursor:grabbing;}
table.data-table thead th.sorted::after{content:' ▾'; color:var(--amber-dark); filter:brightness(1.6);}
table.data-table tbody td{padding:8px 6px; border-bottom:1px solid var(--line-soft); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
table.data-table tbody tr{transition:background var(--dur-fast) var(--ease);}
table.data-table tbody tr:hover{background:var(--paper-alt);}
table.data-table tbody tr:nth-child(even){background:color-mix(in srgb, var(--paper-alt) 55%, transparent);}
table.data-table tbody tr:nth-child(even):hover{background:var(--paper-alt);}
.cell-name{white-space:normal !important; max-width:210px; font-weight:600;}
table.data-table tbody td:last-child{overflow:visible;}
.cell-addr{white-space:normal !important; max-width:250px; color:var(--slate); font-size:12px;}
.mono{font-family:var(--mono); font-variant-numeric:tabular-nums; direction:ltr; text-align:center;}
table.data-table thead th.mono{text-align:center;}
.badge{display:inline-flex; align-items:center; padding:3.5px 10px; border-radius:999px; font-size:11px; font-weight:700;}
.badge-carton{background:var(--amber-tint); color:var(--amber-dark); filter:brightness(.92);}
.badge-status-sent{background:var(--success-tint); color:var(--success);}
.badge-status-pending{background:var(--info-tint); color:var(--info);}
.badge-status-returned{background:var(--danger-tint); color:var(--danger);}
.badge-status-default{background:var(--line-soft); color:var(--slate);}
.row-actions{display:flex; gap:3px; align-items:center;}
.empty-state{text-align:center; padding:64px 20px; color:var(--slate); animation:fadeIn .3s var(--ease);}
.empty-state svg{opacity:.35; margin-bottom:12px;}

.pagination{display:flex; align-items:center; justify-content:space-between; margin-top:14px; font-size:12.5px; color:var(--slate); flex-wrap:wrap; gap:8px;}
.pagination .pg-btns{display:flex; gap:5px;}
.pg-btn{border:1px solid var(--line); background:var(--paper-raised); color:var(--ink); padding:7px 13px; border-radius:10px; cursor:pointer; font-size:12.5px; transition:background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);}
.pg-btn:hover{background:var(--paper);}
.pg-btn:active{transform:scale(.96);}
.pg-btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}
.pg-btn:disabled{opacity:.4; cursor:not-allowed;}

/* ===== Loading / skeleton ===== */
.skel{position:relative; overflow:hidden; background:var(--paper-alt); border-radius:8px;}
.skel::after{content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, var(--line-soft), transparent); background-size:200% 100%; animation:shimmer 1.3s infinite;}
.spinner{width:18px; height:18px; border-radius:50%; border:2.5px solid var(--line); border-top-color:var(--amber); animation:spin .7s linear infinite; display:inline-block;}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(10,12,16,0.5); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;
  animation:fadeIn .18s var(--ease); overflow-y:auto;
}
.modal-box{
  background:var(--paper-raised); border-radius:var(--radius-xl); max-width:820px; width:100%;
  max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); border:1px solid var(--line-soft);
  animation:popIn .32s var(--spring); margin:auto;
}
.modal-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 22px; border-bottom:1px solid var(--line-soft); position:sticky; top:0; background:var(--paper-raised); z-index:2;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-head h3{margin:0; font-size:15px; font-weight:800; letter-spacing:-.01em;}
.modal-close{background:var(--paper); border:none; width:30px; height:30px; border-radius:10px; cursor:pointer; font-size:14px; color:var(--slate); transition:background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);}
.modal-close:hover{background:var(--line-soft);}
.modal-close:active{transform:scale(.9);}
.modal-body{padding:22px;}
.modal-foot{display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid var(--line-soft); position:sticky; bottom:0; background:var(--paper-raised); border-radius:0 0 var(--radius-xl) var(--radius-xl);}

/* ===== iOS-style toggle switches (setting-type checkboxes only; row-select checkboxes stay classic) ===== */
#ldSnap, #ldpVisible{
  appearance:none; -webkit-appearance:none; position:relative;
  width:42px; height:25px; min-width:42px; border-radius:999px;
  background:var(--slate-light); cursor:pointer; outline:none; border:none;
  transition:background var(--dur) var(--ease); vertical-align:middle; flex:none; margin:0;
}
#ldSnap::before, #ldpVisible::before{
  content:''; position:absolute; top:2.5px; right:2.5px; width:20px; height:20px; border-radius:50%;
  background:#fff; box-shadow:0 1.5px 4px rgba(0,0,0,0.25);
  transition:transform var(--dur) var(--spring);
}
#ldSnap:checked, #ldpVisible:checked{background:var(--success);}
#ldSnap:checked::before, #ldpVisible:checked::before{transform:translateX(-17px);}

/* ===== Toast ===== */
.toast{
  position:fixed; bottom:calc(24px + 60px + var(--safe-b)); left:50%; transform:translateX(-50%);
  background:var(--ink); color:var(--paper-raised); padding:12px 20px; border-radius:999px;
  font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:400;
  display:flex; align-items:center; gap:8px; animation:toastIn .38s var(--spring);
  max-width:92vw;
}
.toast.success{background:var(--success); color:#fff;}
.toast.error{background:var(--danger); color:#fff;}
.toast-ic{display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:rgba(255,255,255,0.25); font-size:11px; font-weight:800; flex:none; animation:checkPop .38s var(--spring);}
@media (min-width:769px){ .toast{bottom:24px;} }

/* ===== Mobile bottom nav + FAB ===== */
.bottom-nav{
  display:none; position:fixed;
  left:12px; right:12px; bottom:calc(10px + var(--safe-b)); z-index:150;
  background:var(--glass-bg); -webkit-backdrop-filter:saturate(180%) blur(24px); backdrop-filter:saturate(180%) blur(24px);
  border:1px solid var(--glass-border);
  border-radius:26px;
  padding:6px; box-shadow:var(--shadow-float);
  justify-content:space-around; align-items:center;
}
.bn-indicator{
  position:absolute; top:6px; bottom:6px; border-radius:20px;
  background:var(--amber-tint); z-index:0;
  transition:left var(--dur-slow) var(--spring), width var(--dur-slow) var(--spring);
}
.bn-btn{
  border:none; background:transparent; color:var(--slate); display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:9.5px; font-weight:700; padding:8px 6px; border-radius:18px; flex:1; cursor:pointer;
  transition:color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--spring);
  position:relative; z-index:1;
}
.bn-btn .ic{font-size:20px; line-height:1; transition:transform var(--dur-fast) var(--spring);}
.bn-btn:active{transform:scale(.88);}
.bn-btn:active .ic{transform:scale(1.12);}
.bn-btn.active{color:var(--amber-dark);}
body.theme-dark .bn-btn.active{color:var(--amber);}
.fab{
  display:none;
  position:fixed; bottom:calc(90px + var(--safe-b)); left:20px; z-index:140;
  width:56px; height:56px; border-radius:50%; border:none;
  background:linear-gradient(155deg, var(--amber), var(--amber-dark)); color:#fff;
  font-size:25px; align-items:center; justify-content:center;
  box-shadow:0 10px 26px rgba(79,99,224,0.42), inset 0 1px 0 rgba(255,255,255,0.25);
  transition:transform var(--dur-fast) var(--spring), box-shadow var(--dur-fast) var(--ease);
  animation:popIn .3s var(--spring);
}
.fab:active{transform:scale(.86) rotate(8deg);}
@media (max-width:768px){
  .tabbar{display:none;}
  .bottom-nav{display:flex;}
  .fab.show{display:flex;}
  .page{padding-left:14px; padding-right:14px; padding-bottom:calc(96px + var(--safe-b));}
  .topbar-stats{display:none;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .form-grid{grid-template-columns:1fr !important;}
  .modal-box{border-radius:var(--radius-xl) var(--radius-xl) 0 0; max-height:94vh; margin-top:auto;}
  .modal-overlay{align-items:flex-end; padding:0;}
}

/* ===== Data/backup view ===== */
.databox{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media (max-width:900px){.databox{grid-template-columns:1fr;}}
.databox .card-pad h4{margin:0 0 6px; font-size:14.5px; font-weight:800;}
.databox .card-pad p{margin:0 0 16px; font-size:12.8px; color:var(--slate); line-height:1.7;}
.warn-banner{
  background:var(--amber-tint); border:1px solid var(--line); color:var(--amber-dark);
  border-radius:var(--radius); padding:12px 16px; font-size:12.8px; margin-bottom:18px; display:flex; gap:10px; align-items:flex-start;
}

/* ===== Management ===== */
.gate-box{max-width:380px; margin:60px auto; text-align:center;}
.gate-box .icon{font-size:40px; margin-bottom:10px;}
.mgmt-section{margin-bottom:22px;}
.mgmt-section h4{font-size:14.5px; font-weight:800; margin:0 0 4px; display:flex; align-items:center; gap:8px;}
.mgmt-section .desc{font-size:12.5px; color:var(--slate); margin:0 0 14px;}
.logo-thumb{width:52px; height:52px; border-radius:12px; border:1px solid var(--line); object-fit:cover; background:var(--paper); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--slate-light); overflow:hidden;}
.list-row{display:flex; align-items:center; gap:10px; padding:11px 13px; border:1px solid var(--line-soft); border-radius:var(--radius); margin-bottom:8px; background:var(--paper-raised); transition:box-shadow var(--dur-fast) var(--ease);}
.list-row:hover{box-shadow:var(--shadow-xs);}
.list-row .grow{flex:1; min-width:0;}
.list-row .grow b{display:block; font-size:13px; font-weight:700;}
.list-row .grow small{font-size:11px; color:var(--slate);}
.mini-file{font-size:11px;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip-toggle{display:flex; align-items:center; gap:6px; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:6px 10px; font-size:12px; cursor:pointer;}

/* ===== Print label (unchanged for print fidelity) ===== */
#printRoot{display:none;}
.label-sheet{display:none;}
@media print{
  #appRoot{display:none !important;}
  #printRoot{display:block !important;}
}
.label{
  width:100%; height:100%; box-sizing:border-box;
  font-family:'Vazirmatn',Tahoma,sans-serif; break-inside:avoid;
  display:flex; flex-direction:column; gap:24px; background:#fff; color:#111;
}
.label-page{page-break-after:always; box-sizing:border-box; margin:0 auto;}
.label-page:last-child{page-break-after:auto;}
.label-section{
  flex:none; box-sizing:border-box; display:flex; flex-direction:column;
  padding:0 16px 12px; border:2.2px solid #1a1a1a; border-radius:10px; overflow:hidden; position:relative;
}
.label-section-title{
  margin:0 -16px 10px; padding:9px 18px 8px; font-weight:800; font-size:19px;
  text-align:right; border-bottom:2px solid #1a1a1a;
}
.label-name-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.label-logo-mini{width:64px; flex:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;}
.label-logo-mini img{width:100%; object-fit:contain;}
.label-logo-mini small{font-size:8.5px; font-weight:700; text-align:center; line-height:1.3;}
.label-name-box{
  flex:1; background:#ededed; border-radius:9px; padding:9px 14px;
  font-weight:800; font-size:19px; text-align:right;
}
.label-info-row{display:flex; justify-content:space-between; gap:10px; font-size:14.5px; font-weight:700; margin-bottom:7px;}
.label-info-row b{font-weight:800;}
.label-addr-row{font-size:14px; font-weight:700; line-height:1.7; margin-top:auto;}
.label-addr-row b{font-weight:800;}
.label-shiptype-tag{
  position:absolute; top:-13px; left:16px; z-index:2;
  background:#fff; padding:2px 8px;
  font-size:12.5px; font-weight:800;
}

/* ===== Print report ===== */
.report-sheet{display:none;}
@media print{ .report-sheet{display:block;} }
.report-header{display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--ink); padding-bottom:10px; margin-bottom:12px;}
.report-header .rh-left{display:flex; align-items:center; gap:10px;}
.report-header img{width:40px; height:40px; object-fit:contain;}
.report-header h2{font-size:16px; margin:0;}
.report-header .meta{font-size:11px; color:var(--slate); text-align:left;}
.report-filters{font-size:11px; color:var(--slate); margin-bottom:10px;}
table.report-table{width:100%; border-collapse:collapse; font-size:10.5px;}
table.report-table th, table.report-table td{border:1px solid #999; padding:5px 6px; text-align:right;}
table.report-table th{background:#eee;}

/* pre-print settings modal preview */
.paper-opt{display:flex; gap:10px; flex-wrap:wrap;}
.paper-opt label{flex:1; min-width:90px; border:1px solid var(--line); border-radius:var(--radius); padding:10px; text-align:center; cursor:pointer; font-size:12.5px; font-weight:700; transition:border-color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);}
.paper-opt input{display:none;}
.paper-opt input:checked + span{color:var(--amber-dark);}
.paper-opt label:has(input:checked){border-color:var(--amber); background:var(--amber-tint);}

/* ===== Label Designer ===== */
.ld-wrap{display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;}
.ld-canvas-area{position:relative; background:var(--paper-alt); border-radius:var(--radius); padding:26px 0 0 26px; flex:none;}
.ld-ruler-h{position:absolute; top:0; right:26px; left:0; height:26px; background:repeating-linear-gradient(90deg, var(--slate-light) 0, var(--slate-light) 1px, transparent 1px, transparent 20px); background-position:left top; font-size:8px; color:var(--slate); overflow:hidden;}
.ld-ruler-v{position:absolute; top:26px; right:0; bottom:0; width:26px; background:repeating-linear-gradient(0deg, var(--slate-light) 0, var(--slate-light) 1px, transparent 1px, transparent 20px); font-size:8px; color:var(--slate); overflow:hidden;}
.ld-canvas-holder{background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.15); position:relative; border-radius:4px; overflow:hidden;}
.ld-panel{flex:1; min-width:260px; background:var(--paper-raised); border:1px solid var(--line-soft); border-radius:var(--radius); padding:14px;}
.ld-panel h4{margin:0 0 10px; font-size:13.5px;}
.ld-el-row{display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:9px; cursor:pointer; font-size:12.5px; transition:background var(--dur-fast) var(--ease);}
.ld-el-row:hover{background:var(--paper);}
.ld-el-row.active{background:var(--amber-tint); color:var(--amber-dark); font-weight:700;}
.ld-el-row .eye{cursor:pointer; opacity:.8;}
.ld-field-row{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px;}
.ld-field-row label{flex:none; width:80px; color:var(--slate);}
.ld-field-row input[type="range"]{flex:1; accent-color:var(--amber);}
.ld-field-row input[type="color"]{width:34px; height:26px; padding:0; border:1px solid var(--line); border-radius:8px;}
.ld-field-row select, .ld-field-row input[type="text"], .ld-field-row input[type="number"]{flex:1; padding:6px 9px; border:1px solid var(--line); border-radius:8px; font-size:12px; background:var(--paper-raised); color:var(--ink);}
.ld-corner-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
.ld-corner-grid button{font-size:11px; padding:7px; border:1px solid var(--line); border-radius:8px; background:var(--paper-raised); color:var(--ink); cursor:pointer; transition:.15s;}
.ld-corner-grid button.active{background:var(--amber); color:#fff; border-color:var(--amber);}

/* ===== Footer ===== */
.app-footer{
  text-align:center; padding:16px 20px calc(16px + var(--safe-b)); font-size:12px; color:var(--slate);
  border-top:1px solid var(--line-soft); background:var(--paper-raised); margin-top:20px;
}
@media print{ .app-footer{display:none;} }
@media (max-width:768px){ .app-footer{margin-bottom:64px;} }

/* ===== Accessibility: reduced motion ===== */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration:.001ms !important; animation-iteration-count:1 !important;
    transition-duration:.001ms !important; scroll-behavior:auto !important;
  }
}

/* ===== Accessibility: keyboard focus ===== */
:focus{outline:none;}
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
textarea:focus-visible, [tabindex]:focus-visible{
  outline:2.5px solid var(--amber); outline-offset:2px; border-radius:6px;
}
.btn:focus-visible{box-shadow:0 0 0 3.5px var(--amber-tint); outline-offset:1px;}
.tab-btn:focus-visible, .bn-btn:focus-visible{outline-offset:-2px;}

/* ===== Accessibility: minimum touch targets ===== */
.btn-icon{width:40px; height:40px;}
.modal-close{width:36px; height:36px;}
.theme-toggle button{width:34px; height:32px;}
.bn-btn{min-height:44px;}
.pg-btn{min-height:36px;}
@media (hover:none) and (pointer:coarse){
  .btn{min-height:40px;}
  .field input, .field select, .field textarea{min-height:42px;}
  .row-actions .btn-icon{width:36px; height:36px;}
}
</style>
</head>

function toEnglishDigits(s){
  if(s===null||s===undefined) return s;
  const fa = '۰۱۲۳۴۵۶۷۸۹', ar = '٠١٢٣٤٥٦٧٨٩';
  return String(s).replace(/[۰-۹٠-٩]/g, ch=>{

    if(i>-1) return String(i);
    i = ar.indexOf(ch);
    if(i>-1) return String(i);
    return ch;
  });
}

  num = Math.round(Number(num)||0);
  if(num===0) return 'صفر';
  const neg = num<0; num = Math.abs(num);
  const groups = [];
  while(num>0){ groups.push(num%1000); num = Math.floor(num/1000); }
  const words = [];
  for(let i=groups.length-1; i>=0; i--){
    if(groups[i]===0) continue;
    const gw = threeDigitToWords(groups[i]);
    words.push(i>0 ? `${gw} ${FA_SCALES[i]}` : gw);
  }
  return (neg?'منفی ':'') + words.join(' و ');
}
function todayPersianDateStr(){
  try{
    const parts = new Intl.DateTimeFormat('en-US-u-ca-persian', {year:'numeric', month:'2-digit', day:'2-digit'}).formatToParts(new Date());
    const y = parts.find(p=>p.type==='year').value;
    const m = parts.find(p=>p.type==='month').value;
    const d = parts.find(p=>p.type==='day').value;
    return `${y}/${m.padStart(2,'0')}/${d.padStart(2,'0')}`;
  }catch(e){ return ''; }
}
function normalizeDate(d){
  if(!d) return '';
  const s = toEnglishDigits(String(d).trim());
  const m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(!m) return s;
  return m[1] + '/' + m[2].padStart(2,'0') + '/' + m[3].padStart(2,'0');
}
/* Auto-inserts slashes while the user types a date like 14050420 -> 1405/04/20 */
function attachDateAutoFormat(input){
  input.addEventListener('input', ()=>{
    let digits = toEnglishDigits(input.value).replace(/[^\d]/g,'').slice(0,8);
    let out = digits;
    if(digits.length > 6){ out = digits.slice(0,4)+'/'+digits.slice(4,6)+'/'+digits.slice(6,8); }
    else if(digits.length > 4){ out = digits.slice(0,4)+'/'+digits.slice(4,6); }
    input.value = out;
  });
}

function fileToDataUrl(file){

}

function animateCounters(container){
  const els = container.querySelectorAll('.val[data-count]');
  els.forEach(el=>{
    const target = Number(el.dataset.count)||0;
    if(target===0){ el.textContent = '۰'; return; }
    const dur = 700, start = performance.now();
    function tick(now){
      const p = Math.min(1, (now-start)/dur);
      const eased = 1 - Math.pow(1-p, 3);
      el.textContent = Math.round(target*eased).toLocaleString('fa-IR');
      if(p<1) requestAnimationFrame(tick);
      else el.textContent = target.toLocaleString('fa-IR');
    }
    requestAnimationFrame(tick);
  });
}

function inRange(dateStr, from, to){
  const d = normalizeDate(dateStr);
  if(!d) return !from && !to ? true : false;
  if(from && d < normalizeDate(from)) return false;
  if(to && d > normalizeDate(to)) return false;
  return true;
}
function getFilteredSorted(){
  let rows = RECORDS.slice();
  const q = state.search.trim().toLowerCase();
  if(q){
    rows = rows.filter(r=>{
      return [r.order_no,r.gift_invoice_no,r.receiver_name,r.phone,r.tracking_code,r.address,r.receiver_code,r.postal_code,r.city]
        .some(v=> v!==null && v!==undefined && String(v).toLowerCase().includes(q));
    });
  }
  if(state.invoiceType==='goods') rows = rows.filter(r=> !!r.order_no);
  if(state.invoiceType==='gift') rows = rows.filter(r=> !!r.gift_invoice_no);
  if(state.shippingType) rows = rows.filter(r=> (r.shipping_type||'').trim() === state.shippingType);
  if(state.status) rows = rows.filter(r=> (r.status||'') === state.status || (state.status==='نامشخص' && !r.status));
  if(state.sendFrom || state.sendTo) rows = rows.filter(r=> inRange(r.invoice_send_date, state.sendFrom, state.sendTo));
  if(state.invFrom || state.invTo) rows = rows.filter(r=> inRange(r.invoice_date, state.invFrom, state.invTo));
  const {key,dir} = state.sort;
  rows.sort((a,b)=>{
    let va = a[key], vb = b[key];
    if(key==='invoice_send_date'||key==='invoice_date'){ va = normalizeDate(va); vb = normalizeDate(vb); }
    if(key==='order_no'||key==='gift_invoice_no'||key==='shipping_cost'){
      const na = Number(toEnglishDigits(va)); const nb = Number(toEnglishDigits(vb));
      const aOk = va!==null && va!==undefined && va!=='' && !isNaN(na);
      const bOk = vb!==null && vb!==undefined && vb!=='' && !isNaN(nb);
      if(aOk && bOk) return dir==='asc' ? na-nb : nb-na;
      if(aOk && !bOk) return dir==='asc' ? -1 : 1;
      if(!aOk && bOk) return dir==='asc' ? 1 : -1;
      return 0;
    }
    if(va===null||va===undefined) va='';
    if(vb===null||vb===undefined) vb='';
    if(typeof va === 'number' && typeof vb === 'number') return dir==='asc' ? va-vb : vb-va;
    va = String(va); vb = String(vb);
    return dir==='asc' ? va.localeCompare(vb,'fa') : vb.localeCompare(va,'fa');
  });
  return rows;
}

    state.search=e.target.value; state.page=1;
    document.getElementById('fSearchIcon').textContent = e.target.value ? '✕' : '🔍';
    renderTable();
  });
  document.getElementById('fSearchIcon').addEventListener('click', ()=>{
    if(!state.search) return;
    state.search=''; state.page=1;
    const inp = document.getElementById('fSearch'); inp.value=''; inp.focus();
    document.getElementById('fSearchIcon').textContent = '🔍';
    renderTable();
  });
  document.getElementById('fInvoiceType').addEventListener('change', e=>{ state.invoiceType=e.target.value; state.page=1; renderTable(); });
  document.getElementById('fShip').addEventListener('change', e=>{ state.shippingType=e.target.value; state.page=1; renderTable(); });
  document.getElementById('fStatus').addEventListener('change', e=>{ state.status=e.target.value; state.page=1; renderTable(); });
  ['fInvFrom','fInvTo','fSendFrom','fSendTo'].forEach(id=>{
    attachDateAutoFormat(document.getElementById(id));
    document.getElementById(id).addEventListener('change', e=>{
      const map = {fInvFrom:'invFrom', fInvTo:'invTo', fSendFrom:'sendFrom', fSendTo:'sendTo'};
      state[map[id]] = e.target.value.trim();
      state.page=1; renderTable();
    });
  });
  document.getElementById('btnClearFilters').addEventListener('click', ()=>{
    state.search=''; state.invoiceType=''; state.shippingType=''; state.status='';
    state.sendFrom=''; state.sendTo=''; state.invFrom=''; state.invTo='';
    state.page=1; renderList();
  });
  document.getElementById('btnAddNew').addEventListener('click', ()=> openRecordModal(null));
  document.getElementById('btnPrintSelected').addEventListener('click', ()=>{
    if(state.selected.size===0){ toast('ابتدا حداقل یک مرسوله را انتخاب کنید','error'); return; }
    openPrePrintModal([...state.selected]);
  });
  document.getElementById('btnPrintReport').addEventListener('click', ()=> openReportColumnsModal(getFilteredSorted()));
  document.getElementById('btnFinancialReport').addEventListener('click', ()=> openFinancialReportModal());
  document.getElementById('btnSendReceipt').addEventListener('click', ()=>{
    const rows = state.selected.size>0 ? RECORDS.filter(r=>state.selected.has(r.id)) : getFilteredSorted();
    openSendReceiptModal(rows);
  });
  document.getElementById('btnBulkDelete').addEventListener('click', ()=>{
    if(state.selected.size===0){ toast('ابتدا حداقل یک مورد را انتخاب کنید','error'); return; }
    confirmBulkDelete([...state.selected]);
  });
  renderTable();
}

function renderTable(){
  const holder = document.getElementById('tableHolder');
  const pagHolder = document.getElementById('paginationHolder');
  const rows = getFilteredSorted();
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total/state.pageSize));
  state.page = Math.min(state.page, pages);
  const start = (state.page-1)*state.pageSize;
  const pageRows = rows.slice(start, start+state.pageSize);

  if(total===0){
    holder.innerHTML = `<div class="empty-state">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8L12 3L21 8V16L12 21L3 16V8Z"/><path d="M3 8L12 13L21 8"/></svg>
      <div>هیچ مرسوله‌ای با این فیلترها یافت نشد</div>
    </div>`;
    pagHolder.innerHTML='';
    return;
  }

  const COLUMN_WIDTHS = {
    chk:'3%', order_no:'6%', gift_invoice_no:'6%', invoice_date:'7%', receiver_name:'32%',
    city:'6%', shipping_type:'8%', invoice_send_date:'7%', status:'9%', actions:'16%',
  };
  const colgroup = '<colgroup>' + ['chk', ...LIST_COLUMNS.map(c=>c.key), 'actions']
    .map(k=>`<col style="width:${COLUMN_WIDTHS[k]||'auto'}">`).join('') + '</colgroup>';

  const theadCells = ['<th><input type="checkbox" id="chkAll"/></th>']
    .concat(LIST_COLUMNS.map(c=>`<th data-key="${c.key}" class="${c.cls} ${state.sort.key===c.key?'sorted':''}">${c.label}</th>`))
    .concat(['<th>عملیات</th>']).join('');

  const bodyRows = pageRows.map(r=>{
    const cells = ['<td><input type="checkbox" class="rowChk" data-id="'+r.id+'" '+(state.selected.has(r.id)?'checked':'')+'/></td>']
      .concat(LIST_COLUMNS.map(c=>`<td class="${c.cls}">${c.render(r)}</td>`))
      .concat([`<td><div class="row-actions">
                  ${(r.signature||r.receipt_image)?'<span title="دارای امضا/رسید تحویل" style="font-size:13px;">🖊️</span>':''}
                  <button class="btn btn-ghost btn-icon" title="ویرایش" data-act="edit" data-id="${r.id}">✏️</button>
                  <button class="btn btn-ghost btn-icon" title="چاپ لیبل" data-act="print" data-id="${r.id}">🖨️</button>
                  <button class="btn btn-danger btn-icon" title="حذف" data-act="del" data-id="${r.id}">🗑️</button>
                </div></td>`]).join('');
    return `<tr data-id="${r.id}">${cells}</tr>`;
  }).join('');

  holder.innerHTML = `
    <div class="table-wrap">
      <table class="data-table">
        ${colgroup}
        <thead><tr>${theadCells}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
  `;

  pagHolder.innerHTML = `
    <div class="pagination">
      <div>نمایش ${(start+1).toLocaleString('fa-IR')} تا ${Math.min(start+state.pageSize,total).toLocaleString('fa-IR')} از ${total.toLocaleString('fa-IR')} مورد</div>
      <div class="pg-btns">
        <button class="pg-btn" id="pgPrev" ${state.page<=1?'disabled':''}>قبلی</button>
        <span class="pg-btn active">${state.page.toLocaleString('fa-IR')} / ${pages.toLocaleString('fa-IR')}</span>
        <button class="pg-btn" id="pgNext" ${state.page>=pages?'disabled':''}>بعدی</button>
        <button class="pg-btn" id="pgEdgeToggle">${state.page>=pages ? 'ابتدا (اولین فاکتور)' : 'انتها (آخرین فاکتور)'}</button>
      </div>
    </div>
  `;
  pagHolder.dataset.totalPages = pages;

  holder.querySelectorAll('th[data-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const k = th.dataset.key;
      if(state.sort.key===k) state.sort.dir = state.sort.dir==='asc'?'desc':'asc';
      else state.sort = {key:k, dir:'asc'};
      renderTable();
    });
  });
  holder.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = Number(btn.dataset.id);
      const act = btn.dataset.act;
      if(act==='edit') openRecordModal(id);
      else if(act==='print') openPrePrintModal([id]);
      else if(act==='del') confirmDelete(id);
    });
  });
  const chkAll = document.getElementById('chkAll');
  chkAll.checked = pageRows.length>0 && pageRows.every(r=>state.selected.has(r.id));
  chkAll.addEventListener('change', ()=>{
    pageRows.forEach(r=> chkAll.checked ? state.selected.add(r.id) : state.selected.delete(r.id));
    renderTable();
  });
  holder.querySelectorAll('.rowChk').forEach(chk=>{
    chk.addEventListener('change', ()=>{
      const id = Number(chk.dataset.id);
      chk.checked ? state.selected.add(id) : state.selected.delete(id);
    });
  });
  const prev = document.getElementById('pgPrev'),
        next = document.getElementById('pgNext'), edgeToggle = document.getElementById('pgEdgeToggle');
  if(prev) prev.addEventListener('click', ()=>{ state.page--; renderTable(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(next) next.addEventListener('click', ()=>{ state.page++; renderTable(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(edgeToggle) edgeToggle.addEventListener('click', ()=>{
    state.page = (state.page>=pages) ? 1 : Infinity;
    renderTable(); window.scrollTo({top:0,behavior:'smooth'});
  });
}

            <canvas id="sigPad" style="width:100%; height:160px; border:1px solid var(--line); border-radius:8px; touch-action:none; background:#fff; display:block; margin-top:6px;"></canvas>

  document.getElementById('btnCancelRecord').addEventListener('click', close);
  document.getElementById('ovRecord').addEventListener('click', e=>{ if(e.target.id==='ovRecord') close(); });

  function refreshCityList(){
    const p = document.getElementById('f_province').value;
    const cities = SETTINGS.provincesCities[p] || [];
    document.getElementById('dlCity').innerHTML = cities.map(c=>`<option value="${esc(c)}">`).join('');
  }
  refreshCityList();
  document.getElementById('f_province').addEventListener('change', refreshCityList);
  attachDateAutoFormat(document.getElementById('f_invoice_date'));
  attachDateAutoFormat(document.getElementById('f_invoice_send_date'));

  /* --- signature pad --- */
  const sigCanvas = document.getElementById('sigPad');
  const sigCtx = sigCanvas.getContext('2d');
  let hasSig = false, sigCleared = false;
  function setupCanvas(){
    const ratio = window.devicePixelRatio || 1;
    const rect = sigCanvas.getBoundingClientRect();
    sigCanvas.width = rect.width * ratio;
    sigCanvas.height = rect.height * ratio;
    sigCtx.scale(ratio, ratio);
    sigCtx.lineWidth = 2.2; sigCtx.lineCap = 'round'; sigCtx.strokeStyle = '#1E2A38';
    if(rec.signature){
      const img = new Image();
      img.onload = ()=>{ sigCtx.drawImage(img, 0, 0, rect.width, rect.height); hasSig = true; };
      img.src = rec.signature;
    }
  }
  setupCanvas();
  function posFromEvent(e){
    const rect = sigCanvas.getBoundingClientRect();
    const t = e.touches && e.touches[0] ? e.touches[0] : e;
    return {x: t.clientX - rect.left, y: t.clientY - rect.top};
  }
  let drawing = false;
  const startDraw = e=>{ drawing = true; sigCleared = false; hasSig = true; const p = posFromEvent(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); e.preventDefault(); };
  const moveDraw = e=>{ if(!drawing) return; const p = posFromEvent(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); e.preventDefault(); };
  const endDraw = ()=>{ drawing = false; };
  sigCanvas.addEventListener('mousedown', startDraw);
  sigCanvas.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);
  sigCanvas.addEventListener('touchstart', startDraw, {passive:false});
  sigCanvas.addEventListener('touchmove', moveDraw, {passive:false});
  sigCanvas.addEventListener('touchend', endDraw);
  document.getElementById('btnClearSig').addEventListener('click', ()=>{
    sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
    hasSig = false; sigCleared = true;
  });

  /* --- receipt image upload --- */
  let receiptDataUrl = rec.receipt_image || null;
  function renderReceiptPreview(){

      ? `<div style="display:flex; align-items:center; gap:8px;"><img src="${receiptDataUrl}" style="max-width:150px; max-height:110px; border-radius:8px; border:1px solid var(--line); object-fit:cover;"/><button type="button" class="btn btn-ghost btn-sm" id="btnClearReceipt">حذف تصویر</button></div>`
      : '';

    if(clearBtn) clearBtn.addEventListener('click', ()=>{ receiptDataUrl = null; renderReceiptPreview(); });
  }
  renderReceiptPreview();
  document.getElementById('f_receipt_image').addEventListener('change', async e=>{

    renderReceiptPreview();
  });

  document.getElementById('f_receiver_name').addEventListener('change', e=>{
    const c = findCustomerByName(e.target.value);
    if(c){
      document.getElementById('f_province').value = c.province || '';
      refreshCityList();
      document.getElementById('f_city').value = c.city ?? '';
      document.getElementById('f_address').value = c.address ?? '';
      document.getElementById('f_phone').value = c.phone ?? '';
      document.getElementById('f_mobile').value = c.mobile ?? '';
      document.getElementById('f_postal_code').value = c.postal_code ?? '';
      const last = lastRecordForCustomer(c.name, c.code);
      if(c.default_shipping_type) document.getElementById('f_shipping_type').value = c.default_shipping_type;
      else if(last && last.shipping_type) document.getElementById('f_shipping_type').value = last.shipping_type;
      const lp = (c.default_label_percent===undefined || c.default_label_percent===null) ? 100 : Number(c.default_label_percent);
      const lpSel = document.getElementById('f_label_percent'); if(lpSel) lpSel.value = String(lp);
      toast('اطلاعات مشتری تکمیل شد — در صورت نیاز ویرایش کنید');
    }
  });

  if(editing){
    document.getElementById('btnDeleteInModal').addEventListener('click', ()=>{ close(); confirmDelete(id); });
  }

  document.getElementById('btnSaveRecord').addEventListener('click', ()=>{
    const name = document.getElementById('f_receiver_name').value.trim();
    if(!name){ toast('نام گیرنده الزامی است','error'); return; }
    const data = {
      order_no: document.getElementById('f_order_no').value.trim() || null,
      gift_invoice_no: document.getElementById('f_gift_invoice_no').value.trim() || null,
      shipping_cost: document.getElementById('f_shipping_cost').value ? Number(document.getElementById('f_shipping_cost').value) : null,
      invoice_send_date: document.getElementById('f_invoice_send_date').value.trim() || null,
      receiver_code: rec.receiver_code || (findCustomerByName(name)?.code) || null,
      receiver_name: name,
      carton_count: document.getElementById('f_carton_count').value ? Number(document.getElementById('f_carton_count').value) : null,
      shipping_type: document.getElementById('f_shipping_type').value.trim() || null,
      label_percent: Number(document.getElementById('f_label_percent').value || 100),
      product: document.getElementById('f_product').value.trim() || null,
      invoice_date: document.getElementById('f_invoice_date').value.trim() || todayPersianDateStr(),
      province: document.getElementById('f_province').value.trim() || null,
      city: document.getElementById('f_city').value.trim() || null,
      address: document.getElementById('f_address').value.trim() || null,
      phone: document.getElementById('f_phone').value.trim() || null,
      mobile: document.getElementById('f_mobile').value.trim() || null,
      postal_code: document.getElementById('f_postal_code').value.trim() || null,
      tracking_code: document.getElementById('f_tracking_code').value.trim() || null,
      status: document.getElementById('f_status').value,
      sender: document.getElementById('f_sender').value.trim() || null,
      signature: sigCleared ? null : (hasSig ? sigCanvas.toDataURL('image/png') : (rec.signature || null)),
      receipt_image: receiptDataUrl,
    };
    if(editing){
      Object.assign(rec, data);
      toast('تغییرات ذخیره شد','success');
    } else {
      data.id = nextId++;
      RECORDS.unshift(data);
      state.page = Infinity;
      toast('مرسوله جدید ثبت شد','success');
    }
    const existingCust = findCustomerByName(name);
    if(!existingCust){
      CUSTOMERS.push({
        code: nextCustCode++,
        name: name,
        province: data.province || '',
        city: data.city || '',
        address: data.address || '',
        postal_code: data.postal_code || '',
        phone: data.phone || '',
        mobile: data.mobile || '',
        default_shipping_type: data.shipping_type || '',
        default_label_percent: data.label_percent ?? 100,
      });
      toast('گیرنده جدید به لیست مشتریان (مدیریت) اضافه شد','success');
    } else {
      // Keep the customer profile complete: fill in/refresh any field that this record has data for.
      if(data.province) existingCust.province = data.province;
      if(data.city) existingCust.city = data.city;
      if(data.address) existingCust.address = data.address;
      if(data.postal_code) existingCust.postal_code = data.postal_code;
      if(data.phone) existingCust.phone = data.phone;
      if(data.mobile) existingCust.mobile = data.mobile;
      if(data.shipping_type && !existingCust.default_shipping_type) existingCust.default_shipping_type = data.shipping_type;
      if(existingCust.default_label_percent===undefined || existingCust.default_label_percent===null) existingCust.default_label_percent = data.label_percent ?? 100;
    }
    close();
    refreshAll();
  });
}

function confirmDelete(id){
  const rec = RECORDS.find(r=>r.id===id);
  if(!rec) return;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `

/* ===================== Print labels ===================== */
const PAPER_SIZES = {
  A4: {css:'A4', widthmm:210, heightmm:297},
  A5: {css:'A5', widthmm:148, heightmm:210},
  A6: {css:'A6', widthmm:105, heightmm:148},
};
const LD_PX_PER_MM = 4;
const LD_PT2MM = 0.3528;
function labelFieldValue(key, rec, sender){
  switch(key){
    case 'companyName': return SETTINGS.company.name || '';
    case 'shippingType': return rec.shipping_type || '';
    case 'receiver': return rec.receiver_name || '';
    case 'address': return rec.address || '';
    case 'city': return rec.city ? ('شهر: '+rec.city) : '';
    case 'province': return rec.province ? ('استان: '+rec.province) : '';
    case 'postal': return rec.postal_code ? ('کدپستی: '+rec.postal_code) : '';
    case 'orderNo': return rec.order_no ? ('فاکتور: '+rec.order_no) : (rec.gift_invoice_no ? ('فاکتور: '+rec.gift_invoice_no) : '');
    case 'date': return rec.invoice_send_date || rec.invoice_date || '';
    default: return '';
  }
}
function buildLabelSVG(rec, design){
  const sender = SETTINGS.senders[0] || {};
  const W = design.canvasW, H = design.canvasH;
  const parts = [];
  Object.keys(design.elements).forEach(key=>{
    const el = design.elements[key];
    if(!el || !el.visible) return;
    const def = LABEL_ELEMENT_DEFS[key];
    if(def.kind==='logo'){
      const logo = shippingLogo(rec.shipping_type);
      if(!logo) return;
      const size = el.size||el.w||20, pad = el.padding||0, r = el.radius||0;
      parts.push(`<clipPath id="clip-${key}"><rect x="${el.x+pad}" y="${el.y+pad}" width="${Math.max(0,size-2*pad)}" height="${Math.max(0,size-2*pad)}" rx="${r*0.3}"/></clipPath>
        <image href="${esc(logo)}" x="${el.x+pad}" y="${el.y+pad}" width="${Math.max(0,size-2*pad)}" height="${Math.max(0,size-2*pad)}" opacity="${el.opacity??1}" preserveAspectRatio="xMidYMid meet" clip-path="url(#clip-${key})"/>`);
      return;
    }
    const mmFont = (el.fontSize||10)*LD_PT2MM;
    const color = el.color||'#1a1a1a';
    const weight = el.weight||600;
    const anchor = (el.align==='left') ? 'start' : (el.align==='center' ? 'middle' : 'end');
    const textX = anchor==='end' ? el.x+el.w : (anchor==='middle' ? el.x+el.w/2 : el.x);
    if(key==='sender'){
      const lines = [sender.name, [sender.phone].filter(Boolean).join(' - '), [sender.province, sender.city].filter(Boolean).join(' - '), sender.postal_code?('کدپستی: '+sender.postal_code):'', sender.address].filter(Boolean);
      const lineH = mmFont*1.35;
      const tspans = lines.map((ln,i)=>`<tspan x="${textX}" dy="${i===0?0:lineH}">${esc(ln)}</tspan>`).join('');
      parts.push(`<text x="${textX}" y="${el.y+mmFont}" font-family="${esc(el.font||'Vazirmatn')}" font-size="${mmFont}" font-weight="${weight}" fill="${color}" text-anchor="${anchor}" opacity="${el.opacity??1}">${tspans}</text>`);
      return;
    }
    let value;
    if(key==='watermark') value = el.text || SETTINGS.company.name || '';
    else if(key==='customText') value = el.text || '';
    else value = labelFieldValue(key, rec, sender);
    if(!value) return;
    const rotate = el.angle ? ` transform="rotate(${el.angle} ${el.x+el.w/2} ${el.y+(el.h||mmFont)/2})"` : '';
    parts.push(`<text x="${textX}" y="${el.y+mmFont}" font-family="${esc(el.font||'Vazirmatn')}" font-size="${mmFont}" font-weight="${weight}" fill="${color}" text-anchor="${anchor}" opacity="${el.opacity??1}"${rotate}>${esc(value)}</text>`);
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:#fff; display:block;">${parts.join('')}</svg>`;
}
function findSenderByName(name){
  if(!name) return SETTINGS.senders[0] || {};
  return SETTINGS.senders.find(s=> (s.name||'').trim()===String(name).trim()) || SETTINGS.senders[0] || {};
}
function classicLabelHtml(rec, ls){
  const sender = findSenderByName(rec.sender);
  const logo = shippingLogo(rec.shipping_type) || SETTINGS.company.logo || null;
  const senderPhones = [sender.phone].filter(Boolean).join(' - ');
  const receiverPhones = [rec.mobile, rec.phone].filter(Boolean).join(' - ');
  return `
    <div class="label">
      <div class="label-section" style="flex:1;">
        <div class="label-section-title">فرستنده</div>
        <div class="label-name-row">
          ${logo ? `<div class="label-logo-mini"><img src="${logo}"/></div>` : ''}
          <div class="label-name-box">${esc(sender.name)||''}</div>
        </div>
        <div class="label-info-row"><b>استان: ${esc(sender.province)||''}</b><b>شهر: ${esc(sender.city)||''}</b></div>
        <div class="label-info-row"><b>کدپستی: ${esc(sender.postal_code)||''}</b><b>${senderPhones?('تلفن: '+esc(senderPhones)):''}</b></div>
        <div class="label-addr-row"><b>آدرس: </b>${esc(sender.address)||''}</div>
      </div>
      <div class="label-section" style="flex:1.25;">
        ${rec.shipping_type ? `<span class="label-shiptype-tag">${esc(rec.shipping_type)}</span>` : ''}
        <div class="label-section-title">گیرنده</div>
        <div class="label-name-row">
          <div class="label-name-box" style="flex:1;">${esc(rec.receiver_name)||''}</div>
        </div>
        <div class="label-info-row"><b>استان: ${esc(rec.province)||''}</b><b>شهر: ${esc(rec.city)||''}</b></div>
        <div class="label-info-row"><b>کدپستی: ${esc(rec.postal_code)||''}</b><b>${receiverPhones?('تلفن: '+esc(receiverPhones)):''}</b></div>
        <div class="label-addr-row"><b>آدرس: </b>${esc(rec.address)||''}</div>
      </div>
    </div>
  `;
}
function labelHtml(rec, ls){
  const paper = PAPER_SIZES[ls.paperSize] || PAPER_SIZES.A6;
  const orientation = ls.orientation==='landscape' ? 'landscape' : 'portrait';
  const pageMarginMm = ls.margin ?? 8;
  const pageWmm = orientation==='landscape' ? paper.heightmm : paper.widthmm;
  const pageHmm = orientation==='landscape' ? paper.widthmm : paper.heightmm;
  const boxWmm = pageWmm - pageMarginMm*2;
  const boxHmm = pageHmm - pageMarginMm*2;
  const labelPercent = Number(rec.label_percent ?? 100);
  const scale = (labelPercent>0 ? labelPercent/100 : 1) * ((ls.printScale??100)/100);

  if((ls.template||'classic')==='classic'){
    return `
      <div class="label-page" style="width:${boxWmm}mm; height:${boxHmm}mm; display:flex; align-items:center; justify-content:center;">
        <div style="width:${(scale*100).toFixed(1)}%; height:${(scale*100).toFixed(1)}%;">
          ${classicLabelHtml(rec, ls)}
        </div>
      </div>
    `;
  }
  const design = SETTINGS.labelSettings.design || defaultLabelDesign();
  const fitScale = Math.min(boxWmm/design.canvasW, boxHmm/design.canvasH) * scale;
  const outW = (design.canvasW*fitScale).toFixed(1), outH = (design.canvasH*fitScale).toFixed(1);
  const svg = buildLabelSVG(rec, design);
  return `
    <div class="label-page" style="width:${boxWmm}mm; height:${boxHmm}mm; display:flex; align-items:center; justify-content:center;">
      <div style="width:${outW}mm; height:${outH}mm; border:1.5px solid #1a1a1a; border-radius:6px; overflow:hidden;">${svg}</div>
    </div>
  `;
}

    receiver_name:'فروشگاه نمونه', address:'آدرس نمونه برای پیش‌نمایش طراحی لیبل',
    city:'تهران', province:'تهران', postal_code:'1234567890', order_no:'123',

    invoice_send_date: todayPersianDateStr(), label_percent:100,

function openLabelDesigner(){

  const pxW = Math.round(W*LD_PX_PER_MM), pxH = Math.round(H*LD_PX_PER_MM);

    <div class="modal-overlay" id="ovLabelDesigner">
      <div class="modal-box" style="max-width:1180px;">
        <div class="modal-head">
          <h3>🎨 طراحی چاپ لیبل</h3>
          <button class="modal-close" id="closeLabelDesigner">✕</button>
        </div>
        <div class="modal-body">

            <div style="flex:1"></div>
            <button class="btn btn-ghost btn-sm" id="ldDownloadTemplate">⬇️ دانلود قالب</button>
            <label class="btn btn-dark btn-sm" style="cursor:pointer;">بارگذاری قالب<input type="file" accept="application/json" id="ldUploadTemplate" style="display:none;"/></label>

          </div>

              <div class="ld-canvas-holder" style="width:${pxW}px; height:${pxH}px;">
                <canvas id="ldCanvas" width="${pxW}" height="${pxH}"></canvas>
              </div>
              <div style="margin-top:10px; font-size:11.5px; color:var(--slate);">پیش‌نمایش واقعی چاپ:</div>
              <div id="ldPreview" style="width:${pxW}px; border:1px solid var(--line); border-radius:6px; overflow:hidden; margin-top:4px;"></div>
            </div>
            <div class="ld-panel">
              <h4>اجزای لیبل (برای انتخاب کلیک کنید)</h4>
              <div id="ldElList"></div>
              <div id="ldPropPanel" style="margin-top:14px; border-top:1px solid var(--line-soft); padding-top:12px;"></div>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="ldClose2">بستن</button>
        </div>
      </div>
    </div>
  `;
  const close = ()=>{ root.innerHTML=''; renderManagement(); };
  document.getElementById('closeLabelDesigner').addEventListener('click', close);
  document.getElementById('ldClose2').addEventListener('click', close);
  document.getElementById('ovLabelDesigner').addEventListener('click', e=>{ if(e.target.id==='ovLabelDesigner') close(); });

  const canvas = new fabric.Canvas('ldCanvas', {selection:false, backgroundColor:'#ffffff'});
  const objByKey = {};
  let currentKey = null;

  function mm2px(mm){ return mm*LD_PX_PER_MM; }
  function px2mm(px){ return px/LD_PX_PER_MM; }

  function updatePreview(){
    const svg = buildLabelSVG(ldSampleRecord(), design);
    document.getElementById('ldPreview').innerHTML = svg;
  }

  function buildFabricObject(key){
    const el = design.elements[key];
    const def = LABEL_ELEMENT_DEFS[key];
    if(def.kind==='logo'){
      return new fabric.Rect({
        left:mm2px(el.x), top:mm2px(el.y), width:mm2px(el.w), height:mm2px(el.h),
        fill:'#eef1f4', stroke:'#8B97A3', strokeDashArray:[4,3], rx:(el.radius||0), ry:(el.radius||0),
        opacity: el.visible? (el.opacity??1) : 0.18,
      });
    }
    let sample;
    if(key==='sender') sample = 'فرستنده\nنام فرستنده\nتلفن\nآدرس فرستنده';
    else if(key==='receiver') sample = def.label+': '+(LABEL_ELEMENT_DEFS.receiver.text||'نام گیرنده');
    else if(key==='watermark') sample = el.text || SETTINGS.company.name || 'واترمارک';
    else if(key==='customText') sample = el.text || def.label;
    else sample = def.text || def.label;
    const fontPx = (el.fontSize||10) * LD_PT2MM * LD_PX_PER_MM;
    return new fabric.Textbox(sample, {
      left:mm2px(el.x), top:mm2px(el.y), width:mm2px(el.w),
      fontSize:fontPx, fontFamily:el.font||'Vazirmatn', fontWeight:el.weight||600,
      fill:el.color||'#1a1a1a', textAlign: el.align==='left'?'left':(el.align==='center'?'center':'right'),
      opacity: el.visible? (el.opacity??1) : 0.18, angle: el.angle||0, editable:false,
    });
  }

  Object.keys(LABEL_ELEMENT_DEFS).forEach(key=>{
    const obj = buildFabricObject(key);
    obj.ldKey = key;
    objByKey[key] = obj;
    canvas.add(obj);
  });

  function commitObjectToDesign(key){
    const obj = objByKey[key];
    const el = design.elements[key];
    el.x = +px2mm(obj.left).toFixed(1);
    el.y = +px2mm(obj.top).toFixed(1);
    const w = obj.width*(obj.scaleX||1), h = obj.height*(obj.scaleY||1);
    el.w = +px2mm(w).toFixed(1);
    el.h = +px2mm(h).toFixed(1);
    if(LABEL_ELEMENT_DEFS[key].kind==='logo'){
      el.size = Math.max(el.w, el.h);
    } else if(obj.type==='textbox'){
      // Fold uniform scale into font size, then reset scale so future edits stay 1:1.
      const scaleAvg = ((obj.scaleX||1)+(obj.scaleY||1))/2;
      if(Math.abs(scaleAvg-1) > 0.02){
        const newFontPx = obj.fontSize*scaleAvg;
        el.fontSize = +((newFontPx/LD_PX_PER_MM)/LD_PT2MM).toFixed(1);
        obj.set({fontSize:newFontPx, scaleX:1, scaleY:1, width:w});
      }
      if(key==='watermark') el.angle = Math.round(obj.angle||0);
    }
    canvas.requestRenderAll();
    updatePreview();
  }

  canvas.on('object:modified', e=>{
    if(e.target && e.target.ldKey){
      commitObjectToDesign(e.target.ldKey);
      if(currentKey===e.target.ldKey) renderPropPanel();
    }
  });
  canvas.on('object:moving', e=>{
    const obj = e.target;
    if(!obj) return;
    if(document.getElementById('ldSnap') && document.getElementById('ldSnap').checked){
      const grid = mm2px(5);

  canvas.on('selection:created', e=> selectKey(e.selected[0].ldKey));

  canvas.on('selection:cleared', ()=>{ currentKey=null; renderElList(); renderPropPanel(); });

  function selectKey(key){

      </div>`;
    }).join('');
    holder.querySelectorAll('.ld-el-row').forEach(row=>{
      row.addEventListener('click', e=>{
        if(e.target.dataset.eye) return;
        const key = row.dataset.key;
        canvas.setActiveObject(objByKey[key]);
        canvas.requestRenderAll();
        selectKey(key);
      });
    });
    holder.querySelectorAll('[data-eye]').forEach(eye=>{
      eye.addEventListener('click', e=>{
        e.stopPropagation();
        const key = eye.dataset.eye;
        design.elements[key].visible = !design.elements[key].visible;
        objByKey[key].set('opacity', design.elements[key].visible ? (design.elements[key].opacity??1) : 0.18);
        canvas.requestRenderAll();
        renderElList();
        updatePreview();
      });
    });
  }

  function cornerButtons(key){
    const presets = [['top-left','بالا چپ'],['top-right','بالا راست'],['center','وسط'],['bottom-left','گوشه پایین']];
    const el = design.elements[key];
    return `<div class="ld-corner-grid">${presets.map(([p,label])=>`<button data-corner="${p}" class="${el.corner===p?'active':''}">${label}</button>`).join('')}</div>`;
  }

  function applyCorner(key, corner){
    const el = design.elements[key];
    el.corner = corner;
    const size = el.size||el.w||20;
    const margin = 4;
    if(corner==='top-left'){ el.x=margin; el.y=margin; }
    else if(corner==='top-right'){ el.x=W-size-margin; el.y=margin; }
    else if(corner==='center'){ el.x=(W-size)/2; el.y=(H-size)/2; }
    else if(corner==='bottom-left'){ el.x=margin; el.y=H-size-margin; }
    objByKey[key].set({left:mm2px(el.x), top:mm2px(el.y)});
    canvas.requestRenderAll();
    updatePreview();
  }

  function renderPropPanel(){
    const holder = document.getElementById('ldPropPanel');
    if(!currentKey){ holder.innerHTML = '<div style="font-size:12px; color:var(--slate);">یک جزء را از لیست بالا یا با کلیک روی بوم انتخاب کنید.</div>'; return; }
    const key = currentKey, el = design.elements[key], def = LABEL_ELEMENT_DEFS[key];
    let html = `<div style="font-weight:800; margin-bottom:10px;">${def.label}</div>`;

      html += `<div class="ld-field-row"><label>حاشیه (mm)</label><input type="range" id="ldpPadding" min="0" max="10" value="${el.padding||0}"/></div>`;
      html += `<div class="ld-field-row"><label>گردی گوشه</label><input type="range" id="ldpRadius" min="0" max="20" value="${el.radius||0}"/></div>`;
      html += `<div class="ld-field-row"><label>شفافیت</label><input type="range" id="ldpOpacity" min="0" max="1" step="0.05" value="${el.opacity??1}"/></div>`;
      html += `<div class="ld-field-row"><label>موقعیت</label></div>${cornerButtons(key)}`;
    } else {
      html += `<div class="ld-field-row"><label>رنگ</label><input type="color" id="ldpColor" value="${el.color||'#1a1a1a'}"/></div>`;
      html += `<div class="ld-field-row"><label>فونت</label><select id="ldpFont">${['Vazirmatn','Tahoma','Arial'].map(f=>`<option value="${f}" ${el.font===f?'selected':''}>${f}</option>`).join('')}</select></div>`;
      html += `<div class="ld-field-row"><label>اندازه فونت</label><input type="range" id="ldpFontSize" min="6" max="40" value="${el.fontSize||10}"/></div>`;
      html += `<div class="ld-field-row"><label>ضخامت</label><select id="ldpWeight">${[400,600,700,800].map(w=>`<option value="${w}" ${Number(el.weight)===w?'selected':''}>${w}</option>`).join('')}</select></div>`;
      html += `<div class="ld-field-row"><label>چینش</label><select id="ldpAlign">${[['right','راست'],['center','وسط'],['left','چپ']].map(([v,l])=>`<option value="${v}" ${el.align===v?'selected':''}>${l}</option>`).join('')}</select></div>`;
      if(key==='watermark'){
        html += `<div class="ld-field-row"><label>شفافیت</label><input type="range" id="ldpOpacity" min="0" max="1" step="0.05" value="${el.opacity??0.18}"/></div>`;
        html += `<div class="ld-field-row"><label>چرخش (°)</label><input type="range" id="ldpAngle" min="-90" max="90" value="${el.angle||0}"/></div>`;
        html += `<div class="ld-field-row"><label>متن</label><input type="text" id="ldpText" value="${esc(el.text||'')}"/></div>`;
      }
      if(key==='customText'){
        html += `<div class="ld-field-row"><label>متن دلخواه</label><input type="text" id="ldpText" value="${esc(el.text||'')}"/></div>`;
      }
    }
    holder.innerHTML = html;

    const bind = (id, fn)=>{ const node = document.getElementById(id); if(node) node.addEventListener('input', fn); };
    bind('ldpVisible', e=>{ el.visible = e.target.checked; objByKey[key].set('opacity', el.visible ? (el.opacity??1) : 0.18); canvas.requestRenderAll(); renderElList(); updatePreview(); });
    bind('ldpSize', e=>{ el.size = Number(e.target.value); el.w = el.h = el.size; objByKey[key].set({width:mm2px(el.size), height:mm2px(el.size)}); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpPadding', e=>{ el.padding = Number(e.target.value); updatePreview(); });
    bind('ldpRadius', e=>{ el.radius = Number(e.target.value); objByKey[key].set({rx:el.radius, ry:el.radius}); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpOpacity', e=>{ el.opacity = Number(e.target.value); if(el.visible) objByKey[key].set('opacity', el.opacity); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpColor', e=>{ el.color = e.target.value; objByKey[key].set('fill', el.color); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpFont', e=>{ el.font = e.target.value; objByKey[key].set('fontFamily', el.font); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpFontSize', e=>{ el.fontSize = Number(e.target.value); objByKey[key].set('fontSize', el.fontSize*LD_PT2MM*LD_PX_PER_MM); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpWeight', e=>{ el.weight = Number(e.target.value); objByKey[key].set('fontWeight', el.weight); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpAlign', e=>{ el.align = e.target.value; objByKey[key].set('textAlign', el.align==='left'?'left':(el.align==='center'?'center':'right')); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpAngle', e=>{ el.angle = Number(e.target.value); objByKey[key].set('angle', el.angle); canvas.requestRenderAll(); updatePreview(); });
    bind('ldpText', e=>{ el.text = e.target.value; objByKey[key].set('text', el.text || def.label); canvas.requestRenderAll(); updatePreview(); });
    holder.querySelectorAll('[data-corner]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ applyCorner(key, btn.dataset.corner); renderPropPanel(); });
    });
  }

  renderElList();
  renderPropPanel();
  updatePreview();

  document.getElementById('ldSave').addEventListener('click', ()=>{
    toast('قالب لیبل ذخیره شد — از این پس همه لیبل‌ها با این طراحی چاپ می‌شوند','success');
  });
  document.getElementById('ldReset').addEventListener('click', ()=>{
    if(!confirm('طراحی فعلی حذف و تنظیمات پیش‌فرض جایگزین شود؟')) return;
    SETTINGS.labelSettings.design = defaultLabelDesign();
    close();
    openLabelDesigner();
  });
  document.getElementById('ldDownloadTemplate').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(design, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='قالب-لیبل.json'; a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('ldUploadTemplate').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const loaded = JSON.parse(ev.target.result);
        if(!loaded.elements) throw new Error('invalid');
        SETTINGS.labelSettings.design = loaded;
        ensureLabelDesign();
        toast('قالب بارگذاری شد','success');
        close();
        openLabelDesigner();
      }catch(err){ toast('فایل قالب معتبر نیست','error'); }
    };
    reader.readAsText(file);
  });
}

  `;
